<style>
/* ── WFD DESIGN SYSTEM TOKENS ─────────────────────────── */
:root {
  --wfd-black:   #0c0c0d;
  --wfd-gold:    #ffcc00;
  --wfd-maroon:  #990033;

  --gold-50:#fff9e0;--gold-100:#fff0b0;--gold-200:#ffe478;
  --gold-300:#ffd83f;--gold-400:#ffcc00;--gold-500:#e6b800;
  --gold-600:#b88f00;--gold-700:#8a6a00;

  --maroon-50:#fbe9ee;--maroon-100:#f3c0cf;--maroon-200:#e07f9c;
  --maroon-300:#c54871;--maroon-400:#990033;--maroon-500:#800029;
  --maroon-600:#66001f;--maroon-700:#4a0016;

  --ink-900:#0c0c0d;--ink-800:#1c1c1f;--ink-700:#2b2b30;
  --ink-600:#44444c;--ink-500:#61616b;--ink-400:#8a8a93;
  --ink-300:#b6b6bd;--ink-200:#d6d6db;--ink-100:#e9e9ec;
  --ink-50:#f5f5f6;--paper:#ffffff;

  --signal-emergency:#d11f2d;--signal-emergency-bg:#fdeaeb;
  --signal-warning:#f5a623;  --signal-warning-bg:#fef4e3;
  --signal-success:#1f8a4c;  --signal-success-bg:#e7f4ec;
  --signal-info:#1f5fa8;     --signal-info-bg:#e8f0fa;

  --surface-page:var(--ink-50);
  --surface-card:var(--paper);
  --surface-inverse:var(--wfd-black);
  --text-strong:var(--ink-900);
  --text-body:var(--ink-700);
  --text-muted:var(--ink-500);
  --text-faint:var(--ink-400);
  --text-on-dark:#f5f5f6;
  --border-subtle:var(--ink-200);
  --border-default:var(--ink-300);

  --font-display:'Oswald','Arial Narrow',system-ui,sans-serif;
  --font-sans:'Public Sans',system-ui,-apple-system,sans-serif;
  --font-mono:'Roboto Mono',ui-monospace,monospace;

  --text-2xs:0.6875rem;--text-xs:0.75rem;--text-sm:0.875rem;
  --text-base:1rem;--text-lg:1.125rem;--text-xl:1.375rem;
  --text-2xl:1.75rem;--text-3xl:2.25rem;--text-4xl:3rem;
  --text-5xl:4rem;--text-6xl:5.5rem;

  --radius-sm:4px;--radius-md:6px;--radius-lg:10px;--radius-xl:16px;
  --border-accent:3px;
  --shadow-sm:0 1px 3px rgba(12,12,13,.10),0 1px 2px rgba(12,12,13,.06);
  --shadow-md:0 2px 6px rgba(12,12,13,.10),0 4px 12px rgba(12,12,13,.08);
  --ease-standard:cubic-bezier(0.2,0,0,1);
  --dur-base:200ms;--dur-fast:120ms;
}

/* ── RESET ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{font-family:var(--font-sans);background:var(--surface-page);color:var(--text-body);min-height:100%;padding-bottom:env(safe-area-inset-bottom);}

/* ── HEADER ────────────────────────────────────────────── */
.wfd-header{background:var(--wfd-black);border-bottom:var(--border-accent) solid var(--wfd-maroon);position:sticky;top:0;z-index:100;}
.wfd-header-inner{max-width:960px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 1.25rem) 1.5rem 1rem;}
.wfd-eyebrow{font-family:var(--font-display);font-size:var(--text-2xs);font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold-400);margin-bottom:0.35rem;}
.wfd-h1{font-family:var(--font-display);font-size:clamp(2.4rem,7vw,4rem);font-weight:700;line-height:0.95;letter-spacing:0.02em;text-transform:uppercase;color:var(--text-on-dark);}
.wfd-h1 span{color:var(--gold-400);}
.wfd-header-sub{margin-top:0.5rem;font-size:var(--text-sm);color:rgba(255,255,255,.45);font-family:var(--font-sans);}

/* ── STATUS PILL ───────────────────────────────────────── */
.wfd-status-bar{max-width:960px;margin:0 auto;padding:0 1.5rem;}
.wfd-pill{display:inline-flex;align-items:center;gap:8px;padding:0.5rem 1rem;border-radius:0 0 var(--radius-lg) var(--radius-lg);font-family:var(--font-display);font-size:var(--text-xs);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;}
.wfd-pill.loading   {background:#faeeda;color:#633806;}
.wfd-pill.low       {background:var(--signal-success-bg);color:#0e4d2a;}
.wfd-pill.moderate  {background:var(--signal-warning-bg);color:#7a4b00;}
.wfd-pill.high      {background:#fff3e0;color:#7e2c00;}
.wfd-pill.extreme   {background:var(--maroon-50);color:var(--maroon-600);}
.wfd-pill.alert     {background:var(--signal-emergency-bg);color:#7a0e17;}
.wfd-pill.good      {background:var(--signal-success-bg);color:#0e4d2a;}
.wfd-pill.none      {background:var(--signal-success-bg);color:#0e4d2a;}
.wfd-pill-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:currentColor;}
.wfd-pill.loading .wfd-pill-dot,.wfd-pill.extreme .wfd-pill-dot,.wfd-pill.alert .wfd-pill-dot{animation:wfd-pulse 1.2s infinite;}
@keyframes wfd-pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.4);}}

/* ── MAIN ──────────────────────────────────────────────── */
.wfd-main{max-width:960px;margin:0 auto;padding:1.5rem;}

/* ── SECTION LABEL ─────────────────────────────────────── */
.wfd-section-label{font-family:var(--font-display);font-size:var(--text-2xs);font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.7rem;display:flex;align-items:center;gap:6px;}
.wfd-section-label::before{content:'';display:block;width:14px;height:2px;background:var(--wfd-maroon);border-radius:1px;flex-shrink:0;}

/* ── CARD ──────────────────────────────────────────────── */
.wfd-card{background:var(--surface-card);border-radius:var(--radius-lg);border:1px solid var(--border-subtle);box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:1.25rem;}
.wfd-card-accent-top{height:var(--border-accent);background:var(--wfd-maroon);}
.wfd-card-accent-gold{height:var(--border-accent);background:var(--gold-400);}
.wfd-card-body{padding:1.25rem 1.25rem 1.1rem;}
.wfd-card-header{background:var(--wfd-black);padding:0.75rem 1.25rem;font-family:var(--font-display);font-size:var(--text-xs);font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-on-dark);}
.wfd-card-header.gold{color:var(--gold-400);}

/* ── STAT (big number) ─────────────────────────────────── */
.wfd-stat-value{font-family:var(--font-display);font-size:var(--text-5xl);font-weight:700;line-height:1;letter-spacing:-0.01em;color:var(--maroon-400);}
.wfd-stat-label{font-family:var(--font-display);font-size:var(--text-xs);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-top:0.3rem;}
.wfd-stat-sub{font-size:var(--text-xs);color:var(--text-faint);margin-top:0.2rem;}

/* ── METRIC GRID ───────────────────────────────────────── */
.wfd-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.25rem;}
.wfd-metric{background:var(--surface-card);border-radius:var(--radius-lg);border:1px solid var(--border-subtle);padding:0.85rem 1rem;box-shadow:var(--shadow-sm);}
.wfd-metric-label{font-family:var(--font-display);font-size:var(--text-2xs);font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px;}
.wfd-metric-value{font-family:var(--font-mono);font-size:1.5rem;line-height:1;color:var(--text-strong);}
.wfd-metric-unit{font-size:var(--text-xs);color:var(--text-muted);margin-top:2px;}
.wfd-metric.em  .wfd-metric-value{color:var(--signal-emergency);}
.wfd-metric.warn.wfd-metric-value{color:var(--signal-warning);}
.wfd-metric.ok  .wfd-metric-value{color:var(--signal-success);}

/* ── ALERT BAND ────────────────────────────────────────── */
.wfd-alert{display:flex;align-items:flex-start;gap:10px;border-radius:var(--radius-md);border-left:var(--border-accent) solid transparent;padding:0.85rem 1rem;margin-bottom:1rem;font-size:var(--text-sm);}
.wfd-alert.emergency{background:var(--signal-emergency-bg);border-color:var(--signal-emergency);color:#7a0e17;}
.wfd-alert.warning  {background:var(--signal-warning-bg);  border-color:var(--signal-warning);  color:#7a4b00;}
.wfd-alert.success  {background:var(--signal-success-bg);  border-color:var(--signal-success);  color:#0e4d2a;}
.wfd-alert.info     {background:var(--signal-info-bg);     border-color:var(--signal-info);     color:#0e3a6e;}
.wfd-alert.maroon   {background:var(--maroon-50);          border-color:var(--maroon-400);      color:var(--maroon-600);}
.wfd-alert-icon{width:16px;height:16px;flex-shrink:0;margin-top:1px;}
.wfd-alert-title{font-family:var(--font-display);font-size:var(--text-sm);font-weight:600;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:2px;}
.wfd-alert-body{font-size:var(--text-xs);line-height:1.5;opacity:.85;}

/* ── INFO NOTE ─────────────────────────────────────────── */
.wfd-note{background:var(--signal-info-bg);border:1px solid rgba(31,95,168,.2);border-radius:var(--radius-lg);padding:0.85rem 1rem;font-size:var(--text-xs);color:#0e3a6e;line-height:1.55;margin-bottom:1.25rem;}
.wfd-note a{color:#0e3a6e;font-weight:600;}

/* ── LOADING STATE ─────────────────────────────────────── */
.wfd-loading{background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:2rem;text-align:center;color:var(--text-muted);font-size:var(--text-sm);margin-bottom:1.25rem;}
.wfd-spinner{width:26px;height:26px;border:2px solid var(--border-subtle);border-top-color:var(--maroon-400);border-radius:50%;animation:wfd-spin .8s linear infinite;margin:0 auto .75rem;}
@keyframes wfd-spin{to{transform:rotate(360deg);}}

/* ── SCROLL ROW ────────────────────────────────────────── */
.wfd-scroll{overflow-x:auto;margin-bottom:1.25rem;padding-bottom:4px;}
.wfd-scroll-row{display:flex;gap:10px;min-width:max-content;}

/* ── FOOTER ────────────────────────────────────────────── */
.wfd-footer{max-width:960px;margin:0 auto;padding:0 1.5rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.wfd-footer-left{font-size:var(--text-xs);color:var(--text-muted);}
.wfd-footer-left a{color:var(--maroon-400);text-decoration:none;}
.wfd-footer-last{font-size:var(--text-xs);color:var(--text-faint);}

/* ── REFRESH BUTTON ────────────────────────────────────── */
.wfd-refresh-btn{font-family:var(--font-display);font-size:var(--text-xs);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;background:var(--wfd-black);color:var(--text-on-dark);border:none;border-radius:var(--radius-md);padding:0.5rem 1rem;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background var(--dur-fast) var(--ease-standard);}
.wfd-refresh-btn:hover{background:var(--maroon-400);}
.wfd-refresh-btn svg,.wfd-refresh-btn i{width:13px;height:13px;}

/* ── BOTTOM NAV (PWA) ──────────────────────────────────── */
.wfd-bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(12,12,13,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.08);padding:8px 0 calc(8px + env(safe-area-inset-bottom));display:none;align-items:center;justify-content:space-around;z-index:999;}
.wfd-bottom-nav.active{display:flex;}
.wfd-nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:rgba(255,255,255,.5);font-family:var(--font-display);font-size:0.6rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:4px 18px;border-radius:var(--radius-md);transition:color var(--dur-fast);cursor:pointer;background:none;border:none;}
.wfd-nav-btn:active{color:var(--gold-400);transform:scale(.92);}
.wfd-nav-btn.home{color:var(--gold-400);}
.wfd-nav-icon{width:20px;height:20px;margin-bottom:1px;}
body.pwa-mode{padding-bottom:calc(64px + env(safe-area-inset-bottom))!important;}

/* ── TABLE ─────────────────────────────────────────────── */
.wfd-table{background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1.25rem;}
.wfd-table-row{display:grid;align-items:center;gap:12px;padding:9px 14px;border-bottom:1px solid var(--border-subtle);font-size:var(--text-sm);}
.wfd-table-row:last-child{border-bottom:none;}
.wfd-table-row.header{font-family:var(--font-display);font-size:var(--text-2xs);letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);font-weight:600;background:var(--ink-50);}
.wfd-table-row.active{background:#fffbf0;}

/* ── RESPONSIVE ────────────────────────────────────────── */
@media(min-width:768px){
  .wfd-header-inner{padding:calc(env(safe-area-inset-top) + 1.4rem) 2rem 1.2rem;}
  .wfd-h1{font-size:clamp(3rem,7vw,4.5rem);}
  .wfd-status-bar{padding:0 2rem;}
  .wfd-main{padding:1.8rem 2rem;}
  .wfd-footer{padding:0 2rem 2rem;}
}


</style>
</head>
<body>

<header class="wfd-header">
  <div class="wfd-header-inner">
    <div class="wfd-eyebrow">Fire Risk</div>
    <h1 class="wfd-h1">Precip Deficit</h1>
    <p class="wfd-header-sub">Westminster, CO — Dryness & Drought Tracker</p>
  </div>
</header>

<div class="wfd-status-bar">
  <div class="wfd-pill loading" id="status-pill">
    <div class="wfd-pill-dot"></div>
    <span id="status-text">Loading…</span>
  </div>
</div>

</main>

  <div class="wfd-footer-left"><a href="https://www.ncei.noaa.gov" target="_blank">NOAA NCEI</a> &bull; <a href="https://droughtmonitor.unl.edu" target="_blank">US Drought Monitor</a> &bull; <span id="last-updated" class="wfd-footer-last">—</span></div>

  <a class="wfd-nav-btn" href="javascript:history.back()"><i data-lucide="chevron-left" class="wfd-nav-icon"></i>Back</a>
</nav>

<script>

var BIN_ID     = '6a0ca0e6ee5a733b12e69903';
var MASTER_KEY = '$2a$10$AmSubp9/w6PuIlI6TPzuu.oDt3nlAY/4VL30jINVp2iZuvguywN2.';
var PASSWORD   = 'WestyFD';
var API_BASE   = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

var STATION_ID = 'USW00003017';
var MONTHLY_NORMALS = [0.51,0.48,1.27,1.72,2.14,1.81,2.17,1.82,1.30,1.00,0.73,0.52];
var MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

var DROUGHT_LEVELS = {
  'None': { label:'None', color:'#2E7D32', bg:'#E8F5E9', desc:'No drought' },
  'D0':   { label:'D0',   color:'#F9A825', bg:'#FFFDE7', desc:'Abnormally Dry' },
  'D1':   { label:'D1',   color:'#EF6C00', bg:'#FFF3E0', desc:'Moderate Drought' },
  'D2':   { label:'D2',   color:'#D85A30', bg:'#FAECE7', desc:'Severe Drought' },
  'D3':   { label:'D3',   color:'#B71C1C', bg:'#FFEBEE', desc:'Extreme Drought' },
  'D4':   { label:'D4',   color:'#4A0000', bg:'#3D0000', desc:'Exceptional Drought' },
};

var currentDroughtData = null;

function deficitLevel(deficit) {
  if (deficit <= -2.0) return { cls:'severe',   label:'Significant Deficit', color:'#D85A30' };
  if (deficit <= -1.0) return { cls:'moderate', label:'Moderate Deficit',    color:'#EF6C00' };
  if (deficit <= -0.2) return { cls:'deficit',  label:'Below Normal',        color:'#F9A825' };
  if (deficit <   0.2) return { cls:'normal',   label:'Near Normal',         color:'#2E7D32' };
  return                      { cls:'surplus',  label:'Above Normal',        color:'#1565C0' };
}

function setStatus(cls, text) {
  var pill = document.getElementById('status-pill');
  pill.className = 'status-pill ' + cls;
  document.getElementById('status-text').textContent = text;
}

function renderDroughtCards(adamsLevel, jeffLevel, updatedDate) {
  var today = updatedDate || new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  var counties = [
    { name:'Adams County',     level: adamsLevel },
    { name:'Jefferson County', level: jeffLevel  },
  ];
  document.getElementById('drought-grid').innerHTML = counties.map(function(c) {
    var lvl = DROUGHT_LEVELS[c.level] || DROUGHT_LEVELS['None'];
    return '<div class="drought-card">' +
      '<div class="drought-accent" style="background:' + lvl.color + '"></div>' +
      '<div class="drought-inner">' +
        '<div class="drought-county">' + c.name + '</div>' +
        '<div class="drought-level" style="color:' + lvl.color + '">' + lvl.label + '</div>' +
        '<div class="drought-desc" style="color:' + lvl.color + '">' + lvl.desc + '</div>' +
        '<div class="drought-date">Updated ' + today + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
  document.getElementById('drought-section').style.display = '';

  // Populate form selects
  if (document.getElementById('adams-drought')) {
    document.getElementById('adams-drought').value = adamsLevel || 'None';
    document.getElementById('jeff-drought').value  = jeffLevel  || 'None';
  }
}

async function loadDrought() {
  try {
    var res  = await fetch(API_BASE + '/latest', { headers: { 'X-Master-Key': MASTER_KEY } });
    var json = await res.json();
    var d    = json.record;
    currentDroughtData = d;
    var adamsLevel = (d.drought_adams      || {}).level || 'None';
    var jeffLevel  = (d.drought_jefferson  || {}).level || 'None';
    var updatedDate= (d.drought_adams      || {}).updated || null;
    renderDroughtCards(adamsLevel, jeffLevel, updatedDate);
  } catch(e) {
    document.getElementById('drought-section').style.display = '';
    document.getElementById('drought-grid').innerHTML =
      '<div style="grid-column:1/-1;font-size:13px;color:var(--smoke);padding:1rem">Could not load drought status. Check connection.</div>';
  }
}

function toggleDroughtAdmin() {
  var body = document.getElementById('drought-admin-body');
  var icon = document.getElementById('drought-toggle-icon');
  body.classList.toggle('open');
  icon.textContent = body.classList.contains('open') ? '▴' : '▾';
  if (body.classList.contains('open')) document.getElementById('drought-pwd').focus();
}

function checkDroughtPwd() {
  if (document.getElementById('drought-pwd').value === PASSWORD) {
    document.getElementById('drought-pwd-section').style.display = 'none';
    document.getElementById('drought-form').classList.add('visible');
    if (currentDroughtData) {
      document.getElementById('adams-drought').value = (currentDroughtData.drought_adams     ||{}).level || 'None';
      document.getElementById('jeff-drought').value  = (currentDroughtData.drought_jefferson ||{}).level || 'None';
    }
  } else {
    document.getElementById('drought-pwd-error').textContent = 'Incorrect password.';
    document.getElementById('drought-pwd').value = '';
    document.getElementById('drought-pwd').focus();
  }
}

async function saveDrought() {
  var msg = document.getElementById('drought-save-msg');
  msg.textContent = 'Saving…';
  msg.className = 'drought-save-msg';
  var today = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

  try {
    var getRes = await fetch(API_BASE + '/latest', { headers: { 'X-Master-Key': MASTER_KEY } });
    var current = await getRes.json();
    var data = current.record;

    data.drought_adams      = { level: document.getElementById('adams-drought').value, updated: today };
    data.drought_jefferson  = { level: document.getElementById('jeff-drought').value,  updated: today };

    var putRes = await fetch(API_BASE, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
      body: JSON.stringify(data)
    });
    if (!putRes.ok) throw new Error('Save failed');

    currentDroughtData = data;
    renderDroughtCards(data.drought_adams.level, data.drought_jefferson.level, today);
    msg.textContent = '✅ Saved!';
    msg.className = 'drought-save-msg success';
    setTimeout(function(){ msg.textContent = ''; }, 3000);
  } catch(e) {
    msg.textContent = '❌ Could not save.';
    msg.className = 'drought-save-msg error';
  }
}

async function fetchPrecip() {
  var now   = new Date();
  var year  = now.getFullYear();
  var start = year + '-01-01';
  var yest  = new Date(now); yest.setDate(yest.getDate() - 1);
  var end   = yest.toISOString().split('T')[0];
  var url   = 'https://www.ncei.noaa.gov/access/services/data/v1?dataset=daily-summaries&stations=' + STATION_ID + '&startDate=' + start + '&endDate=' + end + '&dataTypes=PRCP&format=json&units=standard';
  var res   = await fetch(url);
  if (!res.ok) throw new Error('NCEI HTTP ' + res.status);
  var data  = await res.json();
  return { data: data, end: end };
}

function renderPrecip(records, endDate) {
  var now = new Date();
  var currentMonth = now.getMonth();
  var monthlyObs = new Array(12).fill(0);
  var monthlyHasData = new Array(12).fill(false);

  for (var i = 0; i < records.length; i++) {
    var rec = records[i];
    var month = parseInt(rec.DATE.split('-')[1]) - 1;
    var val = parseFloat(rec.PRCP);
    if (!isNaN(val)) { monthlyObs[month] += val; monthlyHasData[month] = true; }
  }

  var ytdNormal = 0;
  var mtdNormal = MONTHLY_NORMALS[currentMonth];
  for (var i = 0; i <= currentMonth; i++) ytdNormal += MONTHLY_NORMALS[i];

  var ytdObs = 0;
  for (var i = 0; i <= currentMonth; i++) { if (monthlyHasData[i]) ytdObs += monthlyObs[i]; }

  var mtdObs     = monthlyHasData[currentMonth] ? monthlyObs[currentMonth] : null;
  var ytdDeficit = ytdObs - ytdNormal;
  var mtdDeficit = mtdObs !== null ? mtdObs - mtdNormal : null;
  var level      = deficitLevel(ytdDeficit);

  setStatus(level.cls, level.label + ' — ' + (ytdDeficit > 0 ? '+' : '') + ytdDeficit.toFixed(2) + '" YTD');
  document.getElementById('last-updated').textContent =
    'Updated ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'});

  var maxVal  = Math.max(ytdObs, ytdNormal, 0.01);
  var obsPct  = Math.min(100, Math.round((ytdObs    / maxVal) * 100));
  var normPct = Math.min(100, Math.round((ytdNormal / maxVal) * 100));
  var maxMonthly = Math.max.apply(null, MONTHLY_NORMALS.concat(monthlyObs.slice(0, currentMonth+1)).concat([0.1]));

  var monthlyBarsHTML = MONTH_NAMES.map(function(name, i) {
    var isFuture  = i > currentMonth;
    var isCurrent = i === currentMonth;
    var norm = MONTHLY_NORMALS[i];
    var obs  = monthlyHasData[i] ? monthlyObs[i] : null;
    var normH = Math.round((norm / maxMonthly) * 52);
    var obsH  = obs !== null ? Math.round((obs  / maxMonthly) * 52) : 0;
    var diff  = obs !== null ? obs - norm : null;
    var diffColor = diff === null ? '#B4B2A9' : diff < -0.1 ? '#D85A30' : diff > 0.1 ? '#1565C0' : '#2E7D32';
    return '<div class="monthly-bar-card' + (isCurrent?' current':'') + (isFuture?' future':'') + '">' +
      '<div class="monthly-month">' + name + (isCurrent?' ▸':'') + '</div>' +
      '<div class="monthly-bars">' +
        '<div class="bar bar-obs"  style="height:' + obsH  + 'px"></div>' +
        '<div class="bar bar-norm" style="height:' + normH + 'px"></div>' +
      '</div>' +
      '<div class="monthly-val">' + (obs !== null ? obs.toFixed(2)+'"' : '—') + '</div>' +
      (diff !== null ? '<div class="monthly-diff" style="color:' + diffColor + '">' + (diff>0?'+':'') + diff.toFixed(2) + '"</div>' : '') +
    '</div>';
  }).join('');

  document.getElementById('precip-content').innerHTML =
    '<div class="deficit-card">' +
      '<div class="deficit-top">' +
        '<div>' +
          '<div class="deficit-eyebrow">Year-to-Date vs Normal</div>' +
          '<div class="deficit-number" style="color:' + level.color + '">' + (ytdDeficit>0?'+':'') + ytdDeficit.toFixed(2) + '"</div>' +
          '<div class="deficit-label" style="color:' + level.color + '">' + level.label + '</div>' +
        '</div>' +
        '<div class="deficit-right">' +
          '<strong>📍 Denver / Westminster</strong>' +
          'Observed YTD: ' + ytdObs.toFixed(2) + '"<br>' +
          'Normal YTD: ' + ytdNormal.toFixed(2) + '"<br>' +
          '<span style="color:' + level.color + ';font-weight:600">' + Math.abs(ytdDeficit).toFixed(2) + '" ' + (ytdDeficit<0?'below':'above') + ' normal</span><br>' +
          '<span style="font-size:11px">Through ' + new Date(endDate).toLocaleDateString('en-US',{month:'short',day:'numeric'}) + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="precip-bar-section">' +
        '<div class="precip-bar-label">' +
          '<span>Observed <strong style="color:#62B8D4">' + ytdObs.toFixed(2) + '"</strong></span>' +
          '<span>30-yr Normal <strong>' + ytdNormal.toFixed(2) + '"</strong></span>' +
        '</div>' +
        '<div class="precip-bar-track">' +
          '<div class="precip-bar-normal"   style="width:' + normPct + '%"></div>' +
          '<div class="precip-bar-observed" style="width:' + obsPct  + '%;background:' + level.color + '"></div>' +
        '</div>' +
        '<div class="precip-bar-footnote">Denver International Airport (GHCND:USW00003017) · 1991–2020 climate normals</div>' +
      '</div>' +
    '</div>' +

    '<div class="metrics">' +
      '<div class="metric ' + (ytdDeficit<=-1?'alert':ytdDeficit<=-0.2?'warn':ytdDeficit>0.2?'good':'') + '"><div class="metric-label">YTD Deficit</div><div class="metric-value">' + (ytdDeficit>0?'+':'') + ytdDeficit.toFixed(2) + '"</div><div class="metric-unit">vs 30-yr normal</div></div>' +
      '<div class="metric"><div class="metric-label">YTD Observed</div><div class="metric-value">' + ytdObs.toFixed(2) + '"</div><div class="metric-unit">inches this year</div></div>' +
      '<div class="metric"><div class="metric-label">Month to Date</div><div class="metric-value">' + (mtdObs!==null?mtdObs.toFixed(2)+'"':'—') + '</div><div class="metric-unit">Normal: ' + mtdNormal.toFixed(2) + '"</div></div>' +
      '<div class="metric ' + (mtdDeficit!==null&&mtdDeficit<=-0.2?'warn':mtdDeficit!==null&&mtdDeficit>0.2?'good':'') + '"><div class="metric-label">MTD Deficit</div><div class="metric-value">' + (mtdDeficit!==null?(mtdDeficit>0?'+':'')+mtdDeficit.toFixed(2)+'"':'—') + '</div><div class="metric-unit">this month</div></div>' +
    '</div>' +

    '<div class="section-label">Monthly Breakdown — Observed vs Normal</div>' +
    '<div class="monthly-scroll"><div class="monthly-row">' + monthlyBarsHTML + '</div></div>' +
    '<div class="legend">' +
      '<span><span class="legend-dot" style="background:#62B8D4"></span>Observed</span>' +
      '<span><span class="legend-dot" style="background:rgba(44,44,42,0.18)"></span>30-yr Normal</span>' +
      '<span>▸ Current month (MTD)</span>' +
    '</div>';

  // Impact notes
  var impactRows = [];
  if (ytdDeficit <= -2.0) {
    impactRows.push({icon:'🔥', text:'<strong>Significant precipitation deficit:</strong> Fine fuel moisture critically reduced. Expect rapid fire spread and extended spotting distances.'});
  } else if (ytdDeficit <= -1.0) {
    impactRows.push({icon:'⚠️', text:'<strong>Moderate precipitation deficit:</strong> Fine fuels drier than seasonal average. Combined with low humidity and wind, fire behavior can be aggressive.'});
  } else if (ytdDeficit <= -0.2) {
    impactRows.push({icon:'📊', text:'<strong>Slightly below normal precipitation:</strong> Fuels somewhat drier than average. Normal protocols apply with increased awareness during elevated fire weather periods.'});
  } else {
    impactRows.push({icon:'✅', text:'<strong>Near or above normal precipitation:</strong> Fuel moisture tracking with or above seasonal averages. Standard fire weather protocols apply.'});
  }
  impactRows.push({icon:'💡', text:'Westminster tip: Interface areas along Standley Lake and Coal Creek corridor are particularly sensitive to fuel moisture. Dry grass in open space can carry fire rapidly toward structures during west or southwest wind events.'});

  document.getElementById('impact-content').innerHTML =
    '<div class="section-label">Fire Operations Impact</div>' +
    '<div class="impact-card">' +
      '<div class="impact-header">🚒 Westminster FD — Fuel Moisture Assessment</div>' +
      '<div class="impact-body">' +
        impactRows.map(function(r){ return '<div class="impact-row"><div class="impact-icon">'+r.icon+'</div><div>'+r.text+'</div></div>'; }).join('') +
      '</div>' +
    '</div>' +
    '<div class="info-note">ℹ️ Precipitation data from NOAA NCEI daily summaries (Denver International Airport station). Drought status is manually updated by staff each Thursday using data from <a href="https://droughtmonitor.unl.edu" target="_blank">droughtmonitor.unl.edu</a>. <a href="https://droughtmonitor.unl.edu/Data/GISData.aspx" target="_blank">Sign up for free county email alerts</a> to get notified when conditions change.</div>';
}

async function loadData() {
  document.getElementById('precip-content').innerHTML =
    '<div class="loading-state"><div class="spinner"></div>Fetching climate data from NCEI…</div>';
  setStatus('loading', 'Loading precipitation data…');

  await loadDrought();

  try {
    var result = await fetchPrecip();
    renderPrecip(result.data, result.end);
  } catch(err) {
    setStatus('loading', 'Unable to load data');
    document.getElementById('precip-content').innerHTML =
      '<div class="loading-state"><strong>Could not load precipitation data.</strong><br><br>' + err.message + '<br><br>Visit <a href="https://www.ncei.noaa.gov" target="_blank" style="color:var(--blue)">NOAA NCEI</a> directly.</div>';
  }
}

loadData();
setInterval(loadData, 60 * 60 * 1000);

(function() {
  var s = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
  if (s) { document.body.classList.add('pwa-mode'); var n = document.querySelector('.bottom-nav'); if (n) n.classList.add('pwa-active'); }
})();

if(window.lucide) lucide.createIcons();
(function(){
  var s=window.navigator.standalone===true||window.matchMedia('(display-mode: standalone)').matches;
  if(s){document.body.classList.add('pwa-mode');document.getElementById('bottom-nav').classList.add('active');}
  if(window.lucide) lucide.createIcons();
})();
</script>
