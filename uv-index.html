<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>UV Index — Westminster FD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Public+Sans:wght@400;500;600&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
/* ── WFD DESIGN SYSTEM TOKENS ─────────────────────────── */
:root {
  --wfd-black:   #0c0c0d;
  --wfd-gold:    #ffcc00;
  --wfd-maroon:  #990033;

  --gold-50:#fff9e0;--gold-100:#fff0b0;--gold-200:#ffe478;
  --gold-300:#ffd83f;--gold-400:#ffcc00;--gold-500:#e6b800;
  --gold-600:#b88f00;--gold-700:#8a6a00;

  --maroon-50:#fbe9ee;--maroon-100:#f3c0cf;--maroon-200:#e07f9c;
  --maroon-300:#c54871;--maroon-400:#990033;--maroon-500:#800029;
  --maroon-600:#66001f;--maroon-700:#4a0016;

  --ink-900:#0c0c0d;--ink-800:#1c1c1f;--ink-700:#2b2b30;
  --ink-600:#44444c;--ink-500:#61616b;--ink-400:#8a8a93;
  --ink-300:#b6b6bd;--ink-200:#d6d6db;--ink-100:#e9e9ec;
  --ink-50:#f5f5f6;--paper:#ffffff;

  --signal-emergency:#d11f2d;--signal-emergency-bg:#fdeaeb;
  --signal-warning:#f5a623;  --signal-warning-bg:#fef4e3;
  --signal-success:#1f8a4c;  --signal-success-bg:#e7f4ec;
  --signal-info:#1f5fa8;     --signal-info-bg:#e8f0fa;

  --surface-page:var(--ink-50);
  --surface-card:var(--paper);
  --surface-inverse:var(--wfd-black);
  --text-strong:var(--ink-900);
  --text-body:var(--ink-700);
  --text-muted:var(--ink-500);
  --text-faint:var(--ink-400);
  --text-on-dark:#f5f5f6;
  --border-subtle:var(--ink-200);
  --border-default:var(--ink-300);

  --font-display:'Oswald','Arial Narrow',system-ui,sans-serif;
  --font-sans:'Public Sans',system-ui,-apple-system,sans-serif;
  --font-mono:'Roboto Mono',ui-monospace,monospace;

  --text-2xs:0.6875rem;--text-xs:0.75rem;--text-sm:0.875rem;
  --text-base:1rem;--text-lg:1.125rem;--text-xl:1.375rem;
  --text-2xl:1.75rem;--text-3xl:2.25rem;--text-4xl:3rem;
  --text-5xl:4rem;--text-6xl:5.5rem;

  --radius-sm:4px;--radius-md:6px;--radius-lg:10px;--radius-xl:16px;
  --border-accent:3px;
  --shadow-sm:0 1px 3px rgba(12,12,13,.10),0 1px 2px rgba(12,12,13,.06);
  --shadow-md:0 2px 6px rgba(12,12,13,.10),0 4px 12px rgba(12,12,13,.08);
  --ease-standard:cubic-bezier(0.2,0,0,1);
  --dur-base:200ms;--dur-fast:120ms;
}

/* ── RESET ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{font-family:var(--font-sans);background:var(--surface-page);color:var(--text-body);min-height:100%;padding-bottom:env(safe-area-inset-bottom);}

/* ── HEADER ────────────────────────────────────────────── */
.wfd-header{background:var(--wfd-black);border-bottom:var(--border-accent) solid var(--wfd-maroon);position:sticky;top:0;z-index:100;}
.wfd-header-inner{max-width:960px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 1.25rem) 1.5rem 1rem;}
.wfd-eyebrow{font-family:var(--font-display);font-size:var(--text-2xs);font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold-400);margin-bottom:0.35rem;}
.wfd-h1{font-family:var(--font-display);font-size:clamp(2.4rem,7vw,4rem);font-weight:700;line-height:0.95;letter-spacing:0.02em;text-transform:uppercase;color:var(--text-on-dark);}
.wfd-h1 span{color:var(--gold-400);}
.wfd-header-sub{margin-top:0.5rem;font-size:var(--text-sm);color:rgba(255,255,255,.45);font-family:var(--font-sans);}

/* ── STATUS PILL ───────────────────────────────────────── */
.wfd-status-bar{max-width:960px;margin:0 auto;padding:0 1.5rem;}
.wfd-pill{display:inline-flex;align-items:center;gap:8px;padding:0.5rem 1rem;border-radius:0 0 var(--radius-lg) var(--radius-lg);font-family:var(--font-display);font-size:var(--text-xs);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;}
.wfd-pill.loading   {background:#faeeda;color:#633806;}
.wfd-pill.low       {background:var(--signal-success-bg);color:#0e4d2a;}
.wfd-pill.moderate  {background:var(--signal-warning-bg);color:#7a4b00;}
.wfd-pill.high      {background:#fff3e0;color:#7e2c00;}
.wfd-pill.extreme   {background:var(--maroon-50);color:var(--maroon-600);}
.wfd-pill.alert     {background:var(--signal-emergency-bg);color:#7a0e17;}
.wfd-pill.good      {background:var(--signal-success-bg);color:#0e4d2a;}
.wfd-pill.none      {background:var(--signal-success-bg);color:#0e4d2a;}
.wfd-pill-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:currentColor;}
.wfd-pill.loading .wfd-pill-dot,.wfd-pill.extreme .wfd-pill-dot,.wfd-pill.alert .wfd-pill-dot{animation:wfd-pulse 1.2s infinite;}
@keyframes wfd-pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.4);}}

/* ── MAIN ──────────────────────────────────────────────── */
.wfd-main{max-width:960px;margin:0 auto;padding:1.5rem;}

/* ── SECTION LABEL ─────────────────────────────────────── */
.wfd-section-label{font-family:var(--font-display);font-size:var(--text-2xs);font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.7rem;display:flex;align-items:center;gap:6px;}
.wfd-section-label::before{content:'';display:block;width:14px;height:2px;background:var(--wfd-maroon);border-radius:1px;flex-shrink:0;}

/* ── CARD ──────────────────────────────────────────────── */
.wfd-card{background:var(--surface-card);border-radius:var(--radius-lg);border:1px solid var(--border-subtle);box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:1.25rem;}
.wfd-card-accent-top{height:var(--border-accent);background:var(--wfd-maroon);}
.wfd-card-accent-gold{height:var(--border-accent);background:var(--gold-400);}
.wfd-card-body{padding:1.25rem 1.25rem 1.1rem;}
.wfd-card-header{background:var(--wfd-black);padding:0.75rem 1.25rem;font-family:var(--font-display);font-size:var(--text-xs);font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-on-dark);}
.wfd-card-header.gold{color:var(--gold-400);}

/* ── STAT (big number) ─────────────────────────────────── */
.wfd-stat-value{font-family:var(--font-display);font-size:var(--text-5xl);font-weight:700;line-height:1;letter-spacing:-0.01em;color:var(--maroon-400);}
.wfd-stat-label{font-family:var(--font-display);font-size:var(--text-xs);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-top:0.3rem;}
.wfd-stat-sub{font-size:var(--text-xs);color:var(--text-faint);margin-top:0.2rem;}

/* ── METRIC GRID ───────────────────────────────────────── */
.wfd-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.25rem;}
.wfd-metric{background:var(--surface-card);border-radius:var(--radius-lg);border:1px solid var(--border-subtle);padding:0.85rem 1rem;box-shadow:var(--shadow-sm);}
.wfd-metric-label{font-family:var(--font-display);font-size:var(--text-2xs);font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px;}
.wfd-metric-value{font-family:var(--font-mono);font-size:1.5rem;line-height:1;color:var(--text-strong);}
.wfd-metric-unit{font-size:var(--text-xs);color:var(--text-muted);margin-top:2px;}
.wfd-metric.em  .wfd-metric-value{color:var(--signal-emergency);}
.wfd-metric.warn.wfd-metric-value{color:var(--signal-warning);}
.wfd-metric.ok  .wfd-metric-value{color:var(--signal-success);}

/* ── ALERT BAND ────────────────────────────────────────── */
.wfd-alert{display:flex;align-items:flex-start;gap:10px;border-radius:var(--radius-md);border-left:var(--border-accent) solid transparent;padding:0.85rem 1rem;margin-bottom:1rem;font-size:var(--text-sm);}
.wfd-alert.emergency{background:var(--signal-emergency-bg);border-color:var(--signal-emergency);color:#7a0e17;}
.wfd-alert.warning  {background:var(--signal-warning-bg);  border-color:var(--signal-warning);  color:#7a4b00;}
.wfd-alert.success  {background:var(--signal-success-bg);  border-color:var(--signal-success);  color:#0e4d2a;}
.wfd-alert.info     {background:var(--signal-info-bg);     border-color:var(--signal-info);     color:#0e3a6e;}
.wfd-alert.maroon   {background:var(--maroon-50);          border-color:var(--maroon-400);      color:var(--maroon-600);}
.wfd-alert-icon{width:16px;height:16px;flex-shrink:0;margin-top:1px;}
.wfd-alert-title{font-family:var(--font-display);font-size:var(--text-sm);font-weight:600;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:2px;}
.wfd-alert-body{font-size:var(--text-xs);line-height:1.5;opacity:.85;}

/* ── INFO NOTE ─────────────────────────────────────────── */
.wfd-note{background:var(--signal-info-bg);border:1px solid rgba(31,95,168,.2);border-radius:var(--radius-lg);padding:0.85rem 1rem;font-size:var(--text-xs);color:#0e3a6e;line-height:1.55;margin-bottom:1.25rem;}
.wfd-note a{color:#0e3a6e;font-weight:600;}

/* ── LOADING STATE ─────────────────────────────────────── */
.wfd-loading{background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:2rem;text-align:center;color:var(--text-muted);font-size:var(--text-sm);margin-bottom:1.25rem;}
.wfd-spinner{width:26px;height:26px;border:2px solid var(--border-subtle);border-top-color:var(--maroon-400);border-radius:50%;animation:wfd-spin .8s linear infinite;margin:0 auto .75rem;}
@keyframes wfd-spin{to{transform:rotate(360deg);}}

/* ── SCROLL ROW ────────────────────────────────────────── */
.wfd-scroll{overflow-x:auto;margin-bottom:1.25rem;padding-bottom:4px;}
.wfd-scroll-row{display:flex;gap:10px;min-width:max-content;}

/* ── FOOTER ────────────────────────────────────────────── */
.wfd-footer{max-width:960px;margin:0 auto;padding:0 1.5rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.wfd-footer-left{font-size:var(--text-xs);color:var(--text-muted);}
.wfd-footer-left a{color:var(--maroon-400);text-decoration:none;}
.wfd-footer-last{font-size:var(--text-xs);color:var(--text-faint);}

/* ── REFRESH BUTTON ────────────────────────────────────── */
.wfd-refresh-btn{font-family:var(--font-display);font-size:var(--text-xs);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;background:var(--wfd-black);color:var(--text-on-dark);border:none;border-radius:var(--radius-md);padding:0.5rem 1rem;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background var(--dur-fast) var(--ease-standard);}
.wfd-refresh-btn:hover{background:var(--maroon-400);}
.wfd-refresh-btn svg,.wfd-refresh-btn i{width:13px;height:13px;}

/* ── BOTTOM NAV (PWA) ──────────────────────────────────── */
.wfd-bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(12,12,13,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.08);padding:8px 0 calc(8px + env(safe-area-inset-bottom));display:none;align-items:center;justify-content:space-around;z-index:999;}
.wfd-bottom-nav.active{display:flex;}
.wfd-nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:rgba(255,255,255,.5);font-family:var(--font-display);font-size:0.6rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:4px 18px;border-radius:var(--radius-md);transition:color var(--dur-fast);cursor:pointer;background:none;border:none;}
.wfd-nav-btn:active{color:var(--gold-400);transform:scale(.92);}
.wfd-nav-btn.home{color:var(--gold-400);}
.wfd-nav-icon{width:20px;height:20px;margin-bottom:1px;}
body.pwa-mode{padding-bottom:calc(64px + env(safe-area-inset-bottom))!important;}

/* ── TABLE ─────────────────────────────────────────────── */
.wfd-table{background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1.25rem;}
.wfd-table-row{display:grid;align-items:center;gap:12px;padding:9px 14px;border-bottom:1px solid var(--border-subtle);font-size:var(--text-sm);}
.wfd-table-row:last-child{border-bottom:none;}
.wfd-table-row.header{font-family:var(--font-display);font-size:var(--text-2xs);letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);font-weight:600;background:var(--ink-50);}
.wfd-table-row.active{background:#fffbf0;}

/* ── RESPONSIVE ────────────────────────────────────────── */
@media(min-width:768px){
  .wfd-header-inner{padding:calc(env(safe-area-inset-top) + 1.4rem) 2rem 1.2rem;}
  .wfd-h1{font-size:clamp(3rem,7vw,4.5rem);}
  .wfd-status-bar{padding:0 2rem;}
  .wfd-main{padding:1.8rem 2rem;}
  .wfd-footer{padding:0 2rem 2rem;}
}


</style>
</head>
<body>

<header class="wfd-header">
  <div class="wfd-header-inner">
    <div class="wfd-eyebrow">Situational Awareness</div>
    <h1 class="wfd-h1">UV Index</h1>
    <p class="wfd-header-sub">Westminster, CO — 7-Day UV Forecast</p>
  </div>
</header>

<div class="wfd-status-bar">
  <div class="wfd-pill loading" id="status-pill">
    <div class="wfd-pill-dot"></div>
    <span id="status-text">Loading…</span>
  </div>
</div>

<main class="wfd-main" id="main-content">
  <div class="wfd-loading"><div class="wfd-spinner"></div>Loading data…</div>
</main>

<footer class="wfd-footer">
  <div class="wfd-footer-left">
    <span id="last-updated" class="wfd-footer-last">—</span>
  </div>
  <button class="wfd-refresh-btn" onclick="loadData()">
    <i data-lucide="refresh-cw"></i> Refresh
  </button>
</footer>

<nav class="wfd-bottom-nav" id="bottom-nav">
  <a class="wfd-nav-btn home" href="index.html"><i data-lucide="home" class="wfd-nav-icon"></i>Home</a>
  <button class="wfd-nav-btn" onclick="window.location.reload()"><i data-lucide="refresh-cw" class="wfd-nav-icon"></i>Refresh</button>
  <a class="wfd-nav-btn" href="javascript:history.back()"><i data-lucide="chevron-left" class="wfd-nav-icon"></i>Back</a>
</nav>

<script>

const NWS_POINT   = 'https://api.weather.gov/points/39.8366,-105.0372';
const NWS_HEADERS = { 'User-Agent': 'WestminsterFDUVTracker/1.0' };

const UV_LEVELS = [
  { label:'Low',       min:0,  max:3,  color:'#3B6D11', pillClass:'low',      desc:'Minimal risk. No special protection needed for short exposures.',
    protection:['👕 Light clothing fine','🧴 SPF 15 if outdoors >1hr','🕶️ Sunglasses optional'] },
  { label:'Moderate',  min:3,  max:6,  color:'#D4A017', pillClass:'moderate',  desc:'Moderate risk. Protection recommended during peak hours (10am–4pm).',
    protection:['🧴 SPF 30+ sunscreen','👒 Hat recommended','🕶️ UV sunglasses','🌳 Seek shade at midday'] },
  { label:'High',      min:6,  max:8,  color:'#D85A30', pillClass:'high',      desc:'High risk. Extra precautions needed. Skin can burn in less than 20 min.',
    protection:['🧴 SPF 50+ sunscreen, reapply q2hr','👒 Wide-brim hat required','🕶️ UV-blocking sunglasses','👕 Cover arms & neck','🌳 Limit midday exposure'] },
  { label:'Very High', min:8,  max:11, color:'#A32D2D', pillClass:'vhigh',     desc:'Very high risk. Take extra precautions. Unprotected skin burns quickly.',
    protection:['🧴 SPF 50+ every 90min','👒 Hat mandatory','🕶️ Wraparound sunglasses','👕 UV-protective clothing','⏱️ Rotate crews out of sun'] },
  { label:'Extreme',   min:11, max:99, color:'#6B0000', pillClass:'extreme',   desc:'Extreme risk. All precautions essential. Avoid sun during peak hours.',
    protection:['🧴 SPF 50+ every hour','👒 Hat mandatory','🕶️ Full UV protection','👕 Max coverage clothing','🏠 Minimize outdoor exposure','⏱️ Frequent crew rotation'] },
];

function getLevel(uv) { return UV_LEVELS.find(l => uv >= l.min && uv < l.max) || UV_LEVELS[4]; }

function setStatus(cls, text) {
  const pill = document.getElementById('status-pill');
  pill.className = 'status-pill ' + cls;
  document.getElementById('status-text').textContent = text;
}

function dayName(iso, i) {
  if (i === 0) return 'Today';
  if (i === 1) return 'Tomorrow';
  return new Date(iso).toLocaleDateString('en-US', { weekday: 'short' });
}

async function loadData() {
  document.getElementById('content-area').innerHTML = `<div class="loading-state"><div class="spinner"></div>Fetching UV forecast from National Weather Service…</div>`;
  setStatus('loading', 'Loading UV data…');

  try {
    const ptRes  = await fetch(NWS_POINT, { headers: NWS_HEADERS });
    const ptData = await ptRes.json();
    const { gridId, gridX, gridY } = ptData.properties;

    // Get daily forecast for UV index
    const fcRes  = await fetch(`https://api.weather.gov/gridpoints/${gridId}/${gridX},${gridY}/forecast`, { headers: NWS_HEADERS });
    const fcData = await fcRes.json();

    // NWS forecast gives day/night periods — grab daytime ones
    const periods = fcData.properties.periods.filter(p => p.isDaytime).slice(0, 7);

    // NWS doesn't always include UV directly — extract from detailed forecast text
    // and use a calculation from temperature/cloud cover as fallback
    // We'll parse UV from the forecast text where available
    function extractUV(period) {
      const text = (period.detailedForecast || period.shortForecast || '').toLowerCase();
      // Look for UV mentions
      const uvMatch = text.match(/uv index[:\s]+(\d+)/i) || text.match(/uv[:\s]+(\d+)/i);
      if (uvMatch) return parseInt(uvMatch[1]);
      // Estimate based on conditions and season
      // Westminster altitude ~5400ft adds ~10-12% UV per 1000ft
      const altitudeBoost = 1.12;
      const month = new Date(period.startTime).getMonth();
      // Base UV by month for Denver latitude (39.8°N)
      const monthlyBase = [3,4,6,7,9,10,10,9,7,5,3,2];
      let base = monthlyBase[month] || 7;
      // Cloud cover reduction
      const sky = text;
      if (sky.includes('sunny') || sky.includes('clear')) base *= 1.0;
      else if (sky.includes('mostly sunny') || sky.includes('mostly clear')) base *= 0.85;
      else if (sky.includes('partly')) base *= 0.7;
      else if (sky.includes('mostly cloudy')) base *= 0.4;
      else if (sky.includes('cloudy') || sky.includes('overcast')) base *= 0.25;
      return Math.round(Math.min(14, base * altitudeBoost));
    }

    const dailyUVs = periods.map(p => ({ ...p, uv: extractUV(p) }));
    const todayUV  = dailyUVs[0]?.uv || 5;
    const todayLevel = getLevel(todayUV);
    const peakDay  = dailyUVs.reduce((max, d) => d.uv > max.uv ? d : max, dailyUVs[0]);

    setStatus(todayLevel.pillClass, `UV ${todayUV} — ${todayLevel.label} — ${todayLevel.desc.split('.')[0]}`);
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', timeZoneName:'short' });

    const scalePct = Math.min(96, Math.max(2, (todayUV / 14) * 100));

    document.getElementById('content-area').innerHTML = `
      <!-- BIG UV DISPLAY -->
      <div class="uv-hero">
        <div class="uv-number" style="color:${todayLevel.color}">${todayUV}</div>
        <div class="uv-right">
          <div class="uv-category" style="color:${todayLevel.color}">${todayLevel.label}</div>
          <div class="uv-desc">${todayLevel.desc}</div>
          <div class="uv-peak">📅 Peak this week: UV ${peakDay.uv} on ${dayName(peakDay.startTime, dailyUVs.indexOf(peakDay))}</div>
        </div>
      </div>

      <!-- SCALE BAR -->
      <div class="uv-scale-wrap">
        <div class="uv-scale-bar">
          <div class="uv-scale-marker" style="left:${scalePct}%"></div>
        </div>
        <div class="uv-scale-labels">
          <span>0 Low</span><span>3</span><span>6</span><span>8</span><span>11+ Extreme</span>
        </div>
      </div>

      <!-- PROTECTION GUIDE -->
      <div class="protection-card">
        <div class="protection-title" style="color:${todayLevel.color}">🛡️ Today's Protection Recommendations</div>
        <div class="protection-items">
          ${todayLevel.protection.map(p => {
            const parts = p.split(' ');
            const icon = parts[0];
            const text = parts.slice(1).join(' ');
            return `<div class="protection-item">
              <div class="protection-icon">${icon}</div>
              <div class="protection-text">${text}</div>
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- DAILY FORECAST -->
      <div class="section-label">7-Day UV Forecast</div>
      <div class="daily-grid">
        ${dailyUVs.map((d, i) => {
          const l = getLevel(d.uv);
          return `<div class="daily-card ${i===0?'today':''}" style="${i===0?'border-color:'+l.color:''}">
            <div class="daily-day">${dayName(d.startTime, i)}</div>
            <div class="daily-uv" style="color:${l.color}">${d.uv}</div>
            <div class="daily-cat" style="color:${l.color}">${l.label}</div>
            <div class="daily-bar" style="background:${l.color}"></div>
          </div>`;
        }).join('')}
      </div>

      <!-- REFERENCE TABLE -->
      <div class="section-label">UV Index Reference — Firefighter Operations</div>
      <div class="ref-table">
        <div class="ref-row header"><div></div><div>Index</div><div>Category</div><div>Recommended Action</div></div>
        ${UV_LEVELS.map(l => {
          const isCurrent = todayUV >= l.min && todayUV < l.max;
          return `<div class="ref-row" style="${isCurrent?'background:#F5F0FF':''}">
            <div class="ref-dot" style="background:${l.color}"></div>
            <div class="ref-range" style="color:${l.color}">${l.min}–${l.max===99?'11+':l.max-1}${isCurrent?'<span class="now-tag">NOW</span>':''}</div>
            <div class="ref-cat" style="color:${l.color}">${l.label}</div>
            <div class="ref-action">${l.protection[0].split(' ').slice(1).join(' ')}. ${l.desc.split('.')[0]}.</div>
          </div>`;
        }).join('')}
      </div>`;

  } catch(err) {
    setStatus('loading', 'Unable to load UV data');
    document.getElementById('content-area').innerHTML = `
      <div class="loading-state">
        <strong>Could not reach the National Weather Service API.</strong><br>
        Check your connection and try refreshing.<br><br>
        <small style="color:#aaa">${err.message}</small>
      </div>`;
  }
}

loadData();
setInterval(loadData, 60 * 60 * 1000); // refresh every hour

if(window.lucide) lucide.createIcons();
(function(){
  var s=window.navigator.standalone===true||window.matchMedia('(display-mode: standalone)').matches;
  if(s){document.body.classList.add('pwa-mode');document.getElementById('bottom-nav').classList.add('active');}
  if(window.lucide) lucide.createIcons();
})();
</script>
</body>
