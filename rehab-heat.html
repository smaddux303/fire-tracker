<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rehab Heat Tracker — Westminster, CO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ash: #2C2C2A; --smoke: #5F5E5A; --mist: #B4B2A9;
    --paper: #F9F6F1; --white: #FFFFFF; --border: rgba(44,44,42,0.12); --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ash); min-height: 100vh; }

  .header { background: #0f1a2e; color: var(--white); position: relative; overflow: hidden; }
  .header-inner { max-width: 960px; margin: 0 auto; padding: 2rem 2rem 1.5rem; position: relative; z-index: 1; }
  .header-eyebrow { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #7EC8E3; margin-bottom: 0.4rem; font-weight: 500; }
  .header h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.8rem, 7vw, 4.5rem); line-height: 0.95; color: var(--white); }
  .header h1 span { color: #7EC8E3; }
  .header-sub { margin-top: 0.6rem; font-size: 14px; color: rgba(255,255,255,0.5); }
  .header-glow { position: absolute; right: -80px; top: -80px; width: 350px; height: 350px; border-radius: 50%; background: radial-gradient(circle, rgba(126,200,227,0.1) 0%, transparent 70%); pointer-events: none; }

  .status-bar { max-width: 960px; margin: 0 auto; padding: 0 2rem; }
  .status-pill { display: inline-flex; align-items: center; gap: 8px; padding: 0.55rem 1.1rem; border-radius: 0 0 var(--radius) var(--radius); font-size: 13px; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; }
  .status-pill.low      { background: #EAF3DE; color: #27500A; }
  .status-pill.moderate { background: #FFF9DB; color: #7A5C00; }
  .status-pill.high     { background: #FAEEDA; color: #633806; }
  .status-pill.extreme  { background: #FCEBEB; color: #791F1F; }
  .status-pill.loading  { background: #E6F1FB; color: #0C447C; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .low      .status-dot { background: #3B6D11; }
  .moderate .status-dot { background: #D4A017; animation: pulse 2s infinite; }
  .high     .status-dot { background: #D85A30; animation: pulse 1.5s infinite; }
  .extreme  .status-dot { background: #E24B4A; animation: pulse 1s infinite; }
  .loading  .status-dot { background: #378ADD; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(1.4);} }

  .main { max-width: 960px; margin: 0 auto; padding: 2rem; }

  /* CURRENT CONDITIONS */
  .current-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1.5rem; }
  @media(max-width:600px){ .current-grid { grid-template-columns: 1fr; } }

  .big-card { border-radius: var(--radius); overflow: hidden; }
  .big-card-header { padding: 0.8rem 1.2rem; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }
  .big-card-body { padding: 1.2rem; background: var(--white); border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius) var(--radius); }
  .big-number { font-family: 'Bebas Neue', sans-serif; font-size: 5rem; line-height: 1; }
  .big-label { font-size: 13px; color: var(--smoke); margin-top: 4px; }
  .big-rehab { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; padding: 4px 10px; border-radius: 5px; margin-top: 10px; }

  /* heat index card */
  .hi-card .big-card-header { background: #D85A30; color: #fff; }
  /* wbgt card */
  .wbgt-card .big-card-header { background: #0f1a2e; color: #7EC8E3; }

  /* METRICS ROW */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .metric { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 0.9rem 1rem; }
  .metric-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--smoke); font-weight: 500; margin-bottom: 4px; }
  .metric-value { font-size: 1.5rem; font-family: 'Bebas Neue', sans-serif; line-height: 1; color: var(--ash); }
  .metric-unit { font-size: 11px; color: var(--smoke); margin-top: 2px; }

  /* NFPA REHAB TABLE */
  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--smoke); font-weight: 600; margin-bottom: 0.8rem; }
  .rehab-table { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1.5rem; }
  .rehab-row { display: grid; grid-template-columns: 28px 110px 1fr 1fr; align-items: center; gap: 12px; padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .rehab-row:last-child { border-bottom: none; }
  .rehab-row.header { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--smoke); font-weight: 600; background: #fafaf8; }
  .rehab-row.active { background: #FFFBF0; }
  .rehab-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .rehab-level { font-weight: 600; }
  .rehab-wbgt { color: var(--smoke); }
  .rehab-action { color: var(--smoke); font-size: 12px; line-height: 1.4; }
  .rehab-row.active .rehab-level { color: var(--ash); }
  .rehab-row.active .rehab-action { color: var(--ash); }
  .current-marker { font-size: 10px; font-weight: 700; background: #0f1a2e; color: #7EC8E3; padding: 2px 6px; border-radius: 3px; margin-left: 6px; vertical-align: middle; }

  /* HOURLY FORECAST */
  .hourly-scroll { overflow-x: auto; margin-bottom: 1.5rem; padding-bottom: 4px; }
  .hourly-track { display: flex; gap: 10px; min-width: max-content; }
  .hourly-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; width: 90px; flex-shrink: 0; text-align: center; }
  .hourly-card.peak { border-color: #D85A30; background: #FAECE7; }
  .hourly-time { font-size: 11px; color: var(--smoke); font-weight: 600; margin-bottom: 6px; }
  .hourly-hi { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; line-height: 1; }
  .hourly-wbgt { font-size: 11px; color: var(--smoke); margin-top: 3px; }
  .hourly-dot { width: 8px; height: 8px; border-radius: 2px; margin: 6px auto 0; }

  .loading-state { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; text-align: center; color: var(--smoke); font-size: 14px; margin-bottom: 1.5rem; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: #D85A30; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 0.8rem; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer { max-width: 960px; margin: 0 auto; padding: 0 2rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .footer-left { font-size: 12px; color: var(--smoke); }
  .footer-left a { color: #7EC8E3; text-decoration: none; }
  .footer-left a:hover { text-decoration: underline; }
  .refresh-btn { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; background: #0f1a2e; color: var(--white); border: none; border-radius: var(--radius); padding: 0.5rem 1.1rem; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
  .refresh-btn:hover { background: #D85A30; }
  .refresh-btn svg { width: 14px; height: 14px; }

  .disclaimer { background: #E6F1FB; border: 1px solid rgba(55,138,221,0.25); border-radius: var(--radius); padding: 0.9rem 1.1rem; font-size: 12px; color: #0C447C; margin-bottom: 1.5rem; line-height: 1.5; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(13,27,42,0.96);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,0.1);
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    display: none;
    align-items: center;
    justify-content: space-around;
    z-index: 999;
  }
  .bottom-nav.pwa-active { display: flex; }
  .bottom-nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    text-decoration: none;
    color: rgba(255,255,255,0.6);
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 4px 20px;
    border-radius: 8px;
    transition: color 0.15s;
    cursor: pointer;
    background: none;
    border: none;
  }
  .bottom-nav-btn:active { color: #F5C842; transform: scale(0.92); }
  .bottom-nav-btn.home { color: #F5C842; }
  .bottom-nav-icon { font-size: 1.3rem; line-height: 1; }
  /* Push page content above nav bar — only when PWA active */
  body.pwa-mode { padding-bottom: calc(64px + env(safe-area-inset-bottom)) !important; }

</style>
</head>
<body>

<div class="header">
  <div class="header-glow"></div>
  <div class="header-inner">
    <div class="header-eyebrow">🚒 Firefighter Rehab Planning</div>
    <h1>Heat <span>Index</span><br>Tracker</h1>
    <p class="header-sub">Westminster, CO &mdash; Current Conditions &amp; Hourly Forecast</p>
  </div>
</div>

<div class="status-bar">
  <div class="status-pill loading" id="status-pill">
    <div class="status-dot"></div>
    <span id="status-text">Loading conditions…</span>
  </div>
</div>

<main class="main">
  <div id="content-area">
    <div class="loading-state"><div class="spinner"></div>Fetching current conditions from National Weather Service…</div>
  </div>
</main>

<footer class="footer">
  <div class="footer-left">
    Data from <a href="https://www.weather.gov/bou/" target="_blank">NWS Boulder</a> &bull;
    WBGT thresholds per <a href="https://www.nfpa.org/codes-and-standards/nfpa-1584" target="_blank">NFPA 1584</a> &bull;
    <span id="last-updated">—</span>
  </div>
  <button class="refresh-btn" onclick="loadData()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <polyline points="23 4 23 10 17 10"></polyline>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
    </svg>
    Refresh
  </button>
</footer>

<script>
// Westminster, CO — NWS grid point
const NWS_POINTS  = 'https://api.weather.gov/points/39.8366,-105.0372';
const NWS_HEADERS = { 'User-Agent': 'WestminsterFDRehabTracker/1.0' };

// NFPA 1584 WBGT rehab thresholds (°F)
const REHAB_LEVELS = [
  { label: 'Low',      wbgtMin: 0,  wbgtMax: 82,  color: '#3B6D11', bg: '#EAF3DE', textColor: '#27500A', pillType: 'low',
    action: 'Normal operations. Monitor crew condition.' },
  { label: 'Moderate', wbgtMin: 82, wbgtMax: 88,  color: '#D4A017', bg: '#FFF9DB', textColor: '#7A5C00', pillType: 'moderate',
    action: 'Enforce work/rest ratios. Ensure hydration.' },
  { label: 'High',     wbgtMin: 88, wbgtMax: 98,  color: '#D85A30', bg: '#FAEEDA', textColor: '#633806', pillType: 'high',
    action: 'Mandatory rehab after each work cycle. Active cooling required.' },
  { label: 'Extreme',  wbgtMin: 98, wbgtMax: 999, color: '#E24B4A', bg: '#FCEBEB', textColor: '#791F1F', pillType: 'extreme',
    action: 'Extreme danger. Shorten work cycles. Consider suspending non-critical ops.' },
];

function getRehabLevel(wbgt) {
  return REHAB_LEVELS.find(l => wbgt >= l.wbgtMin && wbgt < l.wbgtMax) || REHAB_LEVELS[0];
}

// Heat Index (Rothfusz equation, °F)
function calcHeatIndex(tempF, rh) {
  if (tempF < 80) return tempF;
  const T = tempF, R = rh;
  let hi = -42.379 + 2.04901523*T + 10.14333127*R
           - 0.22475541*T*R - 0.00683783*T*T
           - 0.05481717*R*R + 0.00122874*T*T*R
           + 0.00085282*T*R*R - 0.00000199*T*T*R*R;
  if (R < 13 && T >= 80 && T <= 112) hi -= ((13-R)/4)*Math.sqrt((17-Math.abs(T-95))/17);
  if (R > 85 && T >= 80 && T <= 87) hi += ((R-85)/10)*((87-T)/5);
  return Math.round(hi);
}

// WBGT approximation (Bernard & Pourmoghani, simplified for outdoors, °F)
function calcWBGT(tempF, rh) {
  const tempC = (tempF - 32) * 5/9;
  const e = (rh/100) * 6.105 * Math.exp((25.22*(tempC-0) - 5.31*Math.log((tempC+273.15)/273.15)));
  const Tw = tempC * Math.atan(0.151977 * Math.pow(rh + 8.313659, 0.5))
           + Math.atan(tempC + rh) - Math.atan(rh - 1.676331)
           + 0.00391838 * Math.pow(rh, 1.5) * Math.atan(0.023101 * rh) - 4.686035;
  const wbgtC = 0.7 * Tw + 0.2 * tempC + 0.1 * tempC;
  return Math.round(wbgtC * 9/5 + 32);
}

function cToF(c) { return Math.round(c * 9/5 + 32); }

function formatHour(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('en-US', { hour: 'numeric', hour12: true });
}

function setStatus(type, text) {
  const pill = document.getElementById('status-pill');
  pill.className = 'status-pill ' + type;
  document.getElementById('status-text').textContent = text;
}

async function loadData() {
  document.getElementById('content-area').innerHTML = `<div class="loading-state"><div class="spinner"></div>Fetching current conditions from National Weather Service…</div>`;
  setStatus('loading', 'Loading conditions…');

  try {
    // Get NWS grid info for Westminster
    const pointsRes  = await fetch(NWS_POINTS, { headers: NWS_HEADERS });
    const pointsData = await pointsRes.json();
    const { gridId, gridX, gridY } = pointsData.properties;

    // Fetch hourly forecast
    const hourlyRes  = await fetch(`https://api.weather.gov/gridpoints/${gridId}/${gridX},${gridY}/forecast/hourly`, { headers: NWS_HEADERS });
    const hourlyData = await hourlyRes.json();
    const periods    = hourlyData.properties.periods.slice(0, 12);

    // Current conditions from first period
    const now   = periods[0];
    const tempF = now.temperature; // already °F
    const rh    = now.relativeHumidity?.value || 30;
    const windS = now.windSpeed?.replace(/[^0-9]/g, '') || '0';
    const windD = now.windDirection || '—';
    const desc  = now.shortForecast || '—';

    const heatIndex = calcHeatIndex(tempF, rh);
    const wbgt      = calcWBGT(tempF, rh);
    const rehabLevel = getRehabLevel(wbgt);

    setStatus(rehabLevel.pillType, `WBGT Rehab Level: ${rehabLevel.label} — ${rehabLevel.action.split('.')[0]}`);
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', timeZoneName:'short' });

    // Build hourly data
    const hourlyItems = periods.map(p => {
      const tf  = p.temperature;
      const rhi = p.relativeHumidity?.value || 30;
      const hi  = calcHeatIndex(tf, rhi);
      const wb  = calcWBGT(tf, rhi);
      const rl  = getRehabLevel(wb);
      return { time: formatHour(p.startTime), hi, wbgt: wb, level: rl };
    });

    const peakHI   = Math.max(...hourlyItems.map(h => h.hi));
    const peakWBGT = Math.max(...hourlyItems.map(h => h.wbgt));

    document.getElementById('content-area').innerHTML = `
      <div class="disclaimer">
        ℹ️ <strong>For planning purposes only.</strong> WBGT is calculated from NWS temperature and humidity data using the NFPA 1584 recommended method. Always use a calibrated WBGT meter on scene for official rehab decisions.
      </div>

      <div class="current-grid">
        <div class="big-card hi-card">
          <div class="big-card-header">Heat Index — Feels Like</div>
          <div class="big-card-body">
            <div class="big-number" style="color:${heatIndex >= 103 ? '#E24B4A' : heatIndex >= 91 ? '#D85A30' : heatIndex >= 80 ? '#D4A017' : '#3B6D11'}">${heatIndex}°F</div>
            <div class="big-label">Actual temp: ${tempF}°F &bull; Humidity: ${Math.round(rh)}% &bull; ${desc}</div>
            <div class="big-label" style="margin-top:4px">Wind: ${windS} mph ${windD}</div>
          </div>
        </div>
        <div class="big-card wbgt-card">
          <div class="big-card-header">WBGT — Rehab Indicator</div>
          <div class="big-card-body">
            <div class="big-number" style="color:${rehabLevel.color}">${wbgt}°F</div>
            <div class="big-label">Wet Bulb Globe Temperature (estimated)</div>
            <div class="big-rehab" style="background:${rehabLevel.bg};color:${rehabLevel.textColor}">
              ${rehabLevel.label} Risk
            </div>
          </div>
        </div>
      </div>

      <div class="metrics">
        <div class="metric">
          <div class="metric-label">Temp</div>
          <div class="metric-value">${tempF}°</div>
          <div class="metric-unit">Fahrenheit</div>
        </div>
        <div class="metric">
          <div class="metric-label">Humidity</div>
          <div class="metric-value">${Math.round(rh)}%</div>
          <div class="metric-unit">Relative</div>
        </div>
        <div class="metric">
          <div class="metric-label">Wind</div>
          <div class="metric-value" style="font-size:1.2rem;padding-top:4px">${windS} mph</div>
          <div class="metric-unit">${windD}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Peak HI (12h)</div>
          <div class="metric-value" style="color:${peakHI >= 103 ? '#E24B4A' : peakHI >= 91 ? '#D85A30' : '#3B6D11'}">${peakHI}°</div>
          <div class="metric-unit">Next 12 hours</div>
        </div>
        <div class="metric">
          <div class="metric-label">Peak WBGT (12h)</div>
          <div class="metric-value" style="color:${getRehabLevel(peakWBGT).color}">${peakWBGT}°</div>
          <div class="metric-unit">Next 12 hours</div>
        </div>
      </div>

      <div class="section-label">NFPA 1584 Rehab Thresholds</div>
      <div class="rehab-table">
        <div class="rehab-row header">
          <div></div>
          <div>Level</div>
          <div>WBGT Range</div>
          <div>Recommended Action</div>
        </div>
        ${REHAB_LEVELS.map(l => {
          const isCurrent = wbgt >= l.wbgtMin && wbgt < l.wbgtMax;
          return `
          <div class="rehab-row ${isCurrent ? 'active' : ''}">
            <div class="rehab-dot" style="background:${l.color}"></div>
            <div class="rehab-level" style="color:${l.color}">${l.label}${isCurrent ? '<span class="current-marker">NOW</span>' : ''}</div>
            <div class="rehab-wbgt">${l.wbgtMin}–${l.wbgtMax === 999 ? '99+' : l.wbgtMax}°F</div>
            <div class="rehab-action">${l.action}</div>
          </div>`;
        }).join('')}
      </div>

      <div class="section-label">Hourly Forecast — Heat Index &amp; WBGT</div>
      <div class="hourly-scroll">
        <div class="hourly-track">
          ${hourlyItems.map((h, i) => `
            <div class="hourly-card ${h.hi === peakHI ? 'peak' : ''}">
              <div class="hourly-time">${h.time}</div>
              <div class="hourly-hi" style="color:${h.hi >= 103 ? '#E24B4A' : h.hi >= 91 ? '#D85A30' : h.hi >= 80 ? '#D4A017' : '#3B6D11'}">${h.hi}°</div>
              <div class="hourly-wbgt" style="color:${h.level.color}">WBGT ${h.wbgt}°</div>
              <div class="hourly-dot" style="background:${h.hi >= 103 ? '#E24B4A' : h.hi >= 91 ? '#D85A30' : h.hi >= 80 ? '#D4A017' : '#3B6D11'}"></div>
            </div>`).join('')}
        </div>
      </div>`;

  } catch (err) {
    setStatus('loading', 'Unable to load conditions');
    document.getElementById('content-area').innerHTML = `
      <div class="loading-state">
        <strong>Could not reach the National Weather Service API.</strong><br>
        Check your connection and try refreshing.<br><br>
        <small style="color:#aaa">${err.message}</small>
      </div>`;
  }
}

loadData();
setInterval(loadData, 10 * 60 * 1000);
</script>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <a class="bottom-nav-btn home" href="index.html">
    <div class="bottom-nav-icon">🏠</div>
    <span>Home</span>
  </a>
  <button class="bottom-nav-btn" onclick="window.location.reload()">
    <div class="bottom-nav-icon">🔄</div>
    <span>Refresh</span>
  </button>
  <a class="bottom-nav-btn" href="javascript:history.back()">
    <div class="bottom-nav-icon">◀</div>
    <span>Back</span>
  </button>
</div>


<script>
// Show bottom nav only when running as installed PWA
(function() {
  var isStandalone = window.navigator.standalone === true ||
                     window.matchMedia('(display-mode: standalone)').matches;
  if (isStandalone) {
    document.body.classList.add('pwa-mode');
    var nav = document.querySelector('.bottom-nav');
    if (nav) nav.classList.add('pwa-active');
  }
})();
</script>
</body>
</html>
