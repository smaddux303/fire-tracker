<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Station Dashboard — Westminster Fire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ash: #2C2C2A; --smoke: #5F5E5A; --mist: #B4B2A9;
    --paper: #0F1117; --card: #1A1D27; --card2: #21242F;
    --border: rgba(255,255,255,0.07); --radius: 12px;
    --white: #FFFFFF;
    --green: #4CAF7D; --green-bg: rgba(76,175,125,0.15);
    --yellow: #F5C842; --yellow-bg: rgba(245,200,66,0.15);
    --orange: #D85A30; --orange-bg: rgba(216,90,48,0.15);
    --red: #E24B4A; --red-bg: rgba(226,75,74,0.15);
    --blue: #378ADD; --blue-bg: rgba(55,138,221,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--white);
    min-height: 100vh;
    padding: 16px;
  }

  /* HEADER */
  .dash-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .dash-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.05em; color: var(--white); }
  .dash-title span { color: var(--yellow); }
  .dash-time { text-align: right; }
  .dash-clock { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; line-height: 1; color: var(--white); }
  .dash-date { font-size: 11px; color: var(--mist); margin-top: 2px; }

  /* CURRENT WEATHER — BIG ROW */
  .weather-main {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px;
    margin-bottom: 12px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    align-items: center;
  }
  .weather-temp-block { }
  .weather-temp { font-family: 'Bebas Neue', sans-serif; font-size: 5.5rem; line-height: 1; color: var(--white); }
  .weather-feels { font-size: 13px; color: var(--mist); margin-top: 2px; }
  .weather-desc { font-size: 14px; font-weight: 500; color: var(--white); margin-top: 6px; }
  .weather-location { font-size: 11px; color: var(--mist); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }

  .weather-stats { display: flex; flex-direction: column; gap: 8px; }
  .weather-stat { display: flex; align-items: center; justify-content: space-between; }
  .weather-stat-label { font-size: 11px; color: var(--mist); text-transform: uppercase; letter-spacing: 0.06em; }
  .weather-stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; color: var(--white); }

  /* SECTION HEADERS */
  .section-head {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--mist);
    font-weight: 600;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-head-dot { width: 6px; height: 6px; border-radius: 50%; }

  /* STATUS ROWS */
  .status-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .status-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 12px 14px;
  }
  .status-card-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--mist); margin-bottom: 4px; font-weight: 600; }
  .status-card-value { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; line-height: 1; }
  .status-card-sub { font-size: 11px; color: var(--mist); margin-top: 3px; }
  .status-dot-inline { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

  /* ALERTS */
  .alerts-section { margin-bottom: 12px; }
  .alert-pill {
    background: var(--card);
    border-radius: 8px;
    border: 1px solid var(--border);
    padding: 10px 12px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }
  .alert-pill-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .alert-pill-text { flex: 1; line-height: 1.4; }
  .alert-pill-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; }
  .no-alerts-pill { background: var(--green-bg); border-color: rgba(76,175,125,0.3); color: var(--green); font-size: 13px; padding: 10px 12px; border-radius: 8px; border: 1px solid; margin-bottom: 8px; }

  /* BURN BAN */
  .burnban-section { margin-bottom: 12px; }
  .burnban-row {
    background: var(--card);
    border-radius: 8px;
    border: 1px solid var(--border);
    padding: 10px 12px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .burnban-name { font-size: 12px; color: var(--mist); }
  .burnban-status { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; }

  /* ROAD CONDITIONS */
  .road-section { margin-bottom: 12px; }
  .road-row {
    background: var(--card);
    border-radius: 8px;
    border: 1px solid var(--border);
    padding: 9px 12px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .road-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--white); }
  .road-count { font-size: 11px; }

  /* WBGT */
  .wbgt-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 12px;
  }
  .wbgt-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .wbgt-val { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; line-height: 1; }
  .wbgt-level { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; padding: 3px 8px; border-radius: 4px; }
  .wbgt-track { height: 6px; border-radius: 3px; background: linear-gradient(to right, #4CAF7D 0%, #F5C842 40%, #D85A30 70%, #E24B4A 100%); position: relative; margin-top: 4px; }
  .wbgt-marker { position: absolute; top: -3px; width: 12px; height: 12px; border-radius: 50%; background: var(--white); border: 2px solid var(--paper); transform: translateX(-50%); transition: left 0.5s; }

  /* FOOTER */
  .dash-footer { text-align: center; font-size: 10px; color: var(--mist); padding-top: 8px; border-top: 1px solid var(--border); }
  .dash-footer span { color: rgba(255,255,255,0.3); margin: 0 6px; }

  /* LOADING */
  .loading-block { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.5rem; text-align: center; color: var(--mist); font-size: 13px; margin-bottom: 12px; }
  .spinner { width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--yellow); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.4;} }
  .blink { animation: pulse 2s infinite; }
</style>
</head>
<body>

<div class="dash-header">
  <div>
    <div class="dash-title">Westminster <span>Fire</span></div>
    <div style="font-size:11px;color:var(--mist);text-transform:uppercase;letter-spacing:0.08em">Station Dashboard</div>
  </div>
  <div class="dash-time">
    <div class="dash-clock" id="clock">—</div>
    <div class="dash-date" id="date-display">—</div>
  </div>
</div>

<!-- CURRENT WEATHER -->
<div id="weather-block">
  <div class="loading-block"><div class="spinner"></div>Loading weather…</div>
</div>

<!-- WBGT REHAB -->
<div id="wbgt-block"></div>

<!-- ACTIVE ALERTS -->
<div class="alerts-section">
  <div class="section-head">
    <div class="section-head-dot blink" style="background:var(--red)"></div>
    Active Weather Alerts
  </div>
  <div id="alerts-block"><div class="loading-block"><div class="spinner"></div>Loading alerts…</div></div>
</div>

<!-- BURN BAN -->
<div class="burnban-section">
  <div class="section-head">
    <div class="section-head-dot" style="background:var(--orange)"></div>
    Burn Ban Status
  </div>
  <div id="burnban-block"><div class="loading-block"><div class="spinner"></div>Loading burn ban…</div></div>
</div>

<!-- ROAD CONDITIONS -->
<div class="road-section">
  <div class="section-head">
    <div class="section-head-dot" style="background:var(--yellow)"></div>
    Road Conditions
  </div>
  <div id="road-block"><div class="loading-block"><div class="spinner"></div>Loading roads…</div></div>
</div>

<div class="dash-footer">
  NWS Boulder <span>•</span> CDOT COtrip <span>•</span> JSONbin <span>•</span>
  Auto-refreshes every 10 min <span>•</span> <span id="last-refresh">—</span>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────
const NWS_POINT   = 'https://api.weather.gov/points/39.8366,-105.0372';
const NWS_HEADERS = { 'User-Agent': 'WestminsterFDDashboard/1.0' };
const NWS_ZONES   = ['COZ040','COZ038','COC001','COC059'];
const JSONBIN_ID  = '6a0ca0e6ee5a733b12e69903';
const JSONBIN_KEY = '$2a$10$AmSubp9/w6PuIlI6TPzuu.oDt3nlAY/4VL30jINVp2iZuvguywN2.';

const CORRIDORS = [
  { name:'I-25',   bbox:{minLat:39.5,maxLat:40.2,minLon:-105.05,maxLon:-104.95} },
  { name:'I-70',   bbox:{minLat:39.7,maxLat:39.8,minLon:-105.5, maxLon:-104.6 } },
  { name:'US-36',  bbox:{minLat:39.8,maxLat:40.0,minLon:-105.2, maxLon:-105.0 } },
  { name:'US-287', bbox:{minLat:39.7,maxLat:40.1,minLon:-105.12,maxLon:-105.05} },
];
const AREA_BBOX = {minLat:39.5,maxLat:40.2,minLon:-105.5,maxLon:-104.6};

const REHAB = [
  { label:'Low',     min:0,  max:82,  color:'#4CAF7D', bg:'rgba(76,175,125,0.2)',  tc:'#4CAF7D' },
  { label:'Moderate',min:82, max:88,  color:'#F5C842', bg:'rgba(245,200,66,0.2)', tc:'#F5C842' },
  { label:'High',    min:88, max:98,  color:'#D85A30', bg:'rgba(216,90,48,0.2)',  tc:'#D85A30' },
  { label:'Extreme', min:98, max:999, color:'#E24B4A', bg:'rgba(226,75,74,0.2)',  tc:'#E24B4A' },
];

const BURN_COLORS = { none:'#4CAF7D', stage1:'#F5C842', stage2:'#D85A30', stage3:'#E24B4A', total:'#E24B4A' };

function getRehabLevel(w) { return REHAB.find(r => w >= r.min && w < r.max) || REHAB[0]; }
function calcHI(t,rh) {
  if(t<80) return t;
  let hi=-42.379+2.04901523*t+10.14333127*rh-0.22475541*t*rh-0.00683783*t*t-0.05481717*rh*rh+0.00122874*t*t*rh+0.00085282*t*rh*rh-0.00000199*t*t*rh*rh;
  return Math.round(hi);
}
function calcWBGT(t,rh) {
  const tc=(t-32)*5/9;
  const Tw=tc*Math.atan(0.151977*Math.pow(rh+8.313659,0.5))+Math.atan(tc+rh)-Math.atan(rh-1.676331)+0.00391838*Math.pow(rh,1.5)*Math.atan(0.023101*rh)-4.686035;
  return Math.round((0.7*Tw+0.3*tc)*9/5+32);
}
function inBbox(lat,lon,b) { return lat>=b.minLat&&lat<=b.maxLat&&lon>=b.minLon&&lon<=b.maxLon; }
function getCorr(lat,lon) { return CORRIDORS.find(c=>inBbox(lat,lon,c.bbox))?.name||null; }

// ── CLOCK ───────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit'});
  document.getElementById('date-display').textContent = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
}
setInterval(updateClock, 1000);
updateClock();

// ── WEATHER ─────────────────────────────────────────
async function loadWeather() {
  try {
    const ptRes   = await fetch(NWS_POINT, {headers:NWS_HEADERS});
    const ptData  = await ptRes.json();
    const {gridId,gridX,gridY} = ptData.properties;
    const hrRes   = await fetch(`https://api.weather.gov/gridpoints/${gridId}/${gridX},${gridY}/forecast/hourly`,{headers:NWS_HEADERS});
    const hrData  = await hrRes.json();
    const now     = hrData.properties.periods[0];

    const tempF   = now.temperature;
    const rh      = now.relativeHumidity?.value || 30;
    const wind    = now.windSpeed?.replace(/[^0-9]/g,'')||'0';
    const windDir = now.windDirection||'';
    const desc    = now.shortForecast||'';
    const hi      = calcHI(tempF,rh);
    const wbgt    = calcWBGT(tempF,rh);
    const rl      = getRehabLevel(wbgt);

    const tempColor = tempF>=100?'#E24B4A':tempF>=90?'#D85A30':tempF>=80?'#F5C842':'#4CAF7D';

    document.getElementById('weather-block').innerHTML = `
      <div class="weather-main">
        <div class="weather-temp-block">
          <div class="weather-location">Westminster, CO</div>
          <div class="weather-temp" style="color:${tempColor}">${tempF}°</div>
          <div class="weather-feels">Feels like ${hi}°F</div>
          <div class="weather-desc">${desc}</div>
        </div>
        <div class="weather-stats">
          <div class="weather-stat">
            <div class="weather-stat-label">Humidity</div>
            <div class="weather-stat-val">${Math.round(rh)}%</div>
          </div>
          <div class="weather-stat">
            <div class="weather-stat-label">Wind</div>
            <div class="weather-stat-val">${wind} mph ${windDir}</div>
          </div>
          <div class="weather-stat">
            <div class="weather-stat-label">Heat Index</div>
            <div class="weather-stat-val" style="color:${hi>=103?'#E24B4A':hi>=91?'#D85A30':hi>=80?'#F5C842':'#4CAF7D'}">${hi}°F</div>
          </div>
        </div>
      </div>`;

    const pct = Math.min(100, Math.max(0, (wbgt - 70) / (105 - 70) * 100));
    document.getElementById('wbgt-block').innerHTML = `
      <div class="wbgt-bar" style="margin-bottom:12px">
        <div class="section-head" style="margin-bottom:8px">
          <div class="section-head-dot" style="background:${rl.color}"></div>
          WBGT Rehab Indicator (NFPA 1584)
        </div>
        <div class="wbgt-row">
          <div>
            <div class="wbgt-val" style="color:${rl.color}">${wbgt}°F</div>
            <div style="font-size:11px;color:var(--mist)">Wet Bulb Globe Temp</div>
          </div>
          <div class="wbgt-level" style="background:${rl.bg};color:${rl.tc}">${rl.label} Risk</div>
        </div>
        <div class="wbgt-track">
          <div class="wbgt-marker" style="left:${pct}%"></div>
        </div>
      </div>`;

  } catch(e) {
    document.getElementById('weather-block').innerHTML = `<div class="loading-block">⚠️ Weather unavailable</div>`;
  }
}

// ── ALERTS ──────────────────────────────────────────
async function loadAlerts() {
  try {
    const seen = new Set(); let all = [];
    await Promise.all(NWS_ZONES.map(async z => {
      const r = await fetch(`https://api.weather.gov/alerts/active?zone=${z}`,{headers:NWS_HEADERS});
      const d = await r.json();
      for(const f of d.features||[]) { if(!seen.has(f.id)){seen.add(f.id);all.push(f);} }
    }));

    const FIRE_KW = ['fire','red flag','wind','heat','humidity','dry','flood','tornado','severe','winter','blizzard','ice','snow','freeze','hail'];
    const relevant = all.filter(a => {
      const e=(a.properties.event||'').toLowerCase();
      return FIRE_KW.some(k=>e.includes(k));
    });

    if(relevant.length===0) {
      document.getElementById('alerts-block').innerHTML = `<div class="no-alerts-pill">✅ No active weather alerts for Adams &amp; Jefferson Counties</div>`;
      return;
    }

    const getColor = ev => {
      const e=(ev||'').toLowerCase();
      if(e.includes('tornado')) return {color:'#E24B4A',bg:'rgba(226,75,74,0.2)'};
      if(e.includes('red flag')||e.includes('fire')) return {color:'#D85A30',bg:'rgba(216,90,48,0.2)'};
      if(e.includes('flood')) return {color:'#378ADD',bg:'rgba(55,138,221,0.2)'};
      if(e.includes('severe')) return {color:'#F5C842',bg:'rgba(245,200,66,0.2)'};
      return {color:'#BA7517',bg:'rgba(186,117,23,0.2)'};
    };

    document.getElementById('alerts-block').innerHTML = relevant.slice(0,4).map(a => {
      const s = getColor(a.properties.event);
      const sev = (a.properties.event||'').toLowerCase().includes('warning')?'Warning':(a.properties.event||'').toLowerCase().includes('watch')?'Watch':'Advisory';
      return `<div class="alert-pill">
        <div class="alert-pill-dot" style="background:${s.color}"></div>
        <div class="alert-pill-text">${a.properties.event}</div>
        <div class="alert-pill-badge" style="background:${s.bg};color:${s.color}">${sev}</div>
      </div>`;
    }).join('') + (relevant.length>4?`<div style="font-size:11px;color:var(--mist);text-align:center;padding:4px">+${relevant.length-4} more alerts</div>`:'');

  } catch(e) {
    document.getElementById('alerts-block').innerHTML = `<div class="loading-block">⚠️ Alerts unavailable</div>`;
  }
}

// ── BURN BAN ────────────────────────────────────────
async function loadBurnBan() {
  try {
    const res  = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`,{headers:{'X-Master-Key':JSONBIN_KEY}});
    const json = await res.json();
    const d    = json.record;
    const areas = [
      {name:'Jefferson County', data:d.jefferson},
      {name:'Adams County',     data:d.adams},
      {name:'Westminster',      data:d.westminster},
    ];
    document.getElementById('burnban-block').innerHTML = areas.map(a => {
      const level = a.data?.level||'none';
      const status= a.data?.status||'No Ban';
      const color = BURN_COLORS[level]||'#4CAF7D';
      return `<div class="burnban-row">
        <div class="burnban-name">${a.name}</div>
        <div class="burnban-status" style="color:${color}">
          <span class="status-dot-inline" style="background:${color}"></span>${status}
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('burnban-block').innerHTML = `<div class="loading-block">⚠️ Burn ban data unavailable</div>`;
  }
}

// ── ROAD CONDITIONS ──────────────────────────────────
async function loadRoads() {
  try {
    const [incRes, conRes, closRes] = await Promise.allSettled([
      fetch('https://dtd.cotrip.org/maps/rest/services/public/incidents/MapServer/0/query?where=1%3D1&outFields=*&f=geojson&resultRecordCount=500'),
      fetch('https://dtd.cotrip.org/maps/rest/services/public/construction/MapServer/0/query?where=1%3D1&outFields=*&f=geojson&resultRecordCount=500'),
      fetch('https://dtd.cotrip.org/maps/rest/services/public/closures/MapServer/0/query?where=1%3D1&outFields=*&f=geojson&resultRecordCount=500'),
    ]);

    const events = [];
    const processFeatures = (result, type) => {
      if(result.status!=='fulfilled'||!result.value.ok) return;
      result.value.json().then(data => {
        for(const f of data.features||[]) {
          const coords = f.geometry?.coordinates;
          if(!coords) continue;
          const lon = Array.isArray(coords[0])?coords[0][0]:coords[0];
          const lat = Array.isArray(coords[0])?coords[0][1]:coords[1];
          if(!inBbox(lat,lon,AREA_BBOX)) continue;
          const corr = getCorr(lat,lon);
          if(corr) events.push({type,corridor:corr});
        }
      });
    };

    await Promise.all([
      incRes.status==='fulfilled'&&incRes.value.ok ? incRes.value.json().then(d=>{for(const f of d.features||[]){const c=f.geometry?.coordinates;if(!c)continue;const lon=Array.isArray(c[0])?c[0][0]:c[0];const lat=Array.isArray(c[0])?c[0][1]:c[1];if(!inBbox(lat,lon,AREA_BBOX))continue;const cr=getCorr(lat,lon);if(cr)events.push({type:'incident',corridor:cr});}}) : Promise.resolve(),
      conRes.status==='fulfilled'&&conRes.value.ok ? conRes.value.json().then(d=>{for(const f of d.features||[]){const c=f.geometry?.coordinates;if(!c)continue;const lon=Array.isArray(c[0])?c[0][0]:c[0];const lat=Array.isArray(c[0])?c[0][1]:c[1];if(!inBbox(lat,lon,AREA_BBOX))continue;const cr=getCorr(lat,lon);if(cr)events.push({type:'construction',corridor:cr});}}) : Promise.resolve(),
      closRes.status==='fulfilled'&&closRes.value.ok ? closRes.value.json().then(d=>{for(const f of d.features||[]){const c=f.geometry?.coordinates;if(!c)continue;const lon=Array.isArray(c[0])?c[0][0]:c[0];const lat=Array.isArray(c[0])?c[0][1]:c[1];if(!inBbox(lat,lon,AREA_BBOX))continue;const cr=getCorr(lat,lon);if(cr)events.push({type:'closure',corridor:cr});}}) : Promise.resolve(),
    ]);

    const summary = CORRIDORS.map(c => {
      const ces  = events.filter(e=>e.corridor===c.name);
      const hasClosure  = ces.some(e=>e.type==='closure');
      const hasIncident = ces.some(e=>e.type==='incident');
      const color = hasClosure?'#E24B4A':hasIncident?'#F5C842':ces.length>0?'#D4A017':'#4CAF7D';
      const label = hasClosure?'CLOSED':hasIncident?`${ces.length} incident${ces.length>1?'s':''}`:ces.length>0?`${ces.length} event${ces.length>1?'s':''}`:'Clear';
      return {name:c.name, color, label};
    });

    document.getElementById('road-block').innerHTML = summary.map(s=>`
      <div class="road-row">
        <div class="road-name"><span class="status-dot-inline" style="background:${s.color}"></span>${s.name}</div>
        <div class="road-count" style="color:${s.color};font-weight:600">${s.label}</div>
      </div>`).join('');

  } catch(e) {
    document.getElementById('road-block').innerHTML = `<div class="loading-block">⚠️ Road data unavailable — check <a href="https://cotrip.org" style="color:var(--yellow)">COtrip.org</a></div>`;
  }
}

// ── REFRESH ALL ──────────────────────────────────────
async function refreshAll() {
  await Promise.allSettled([loadWeather(), loadAlerts(), loadBurnBan(), loadRoads()]);
  document.getElementById('last-refresh').textContent = 'Refreshed ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'});
}

refreshAll();
setInterval(refreshAll, 10 * 60 * 1000);
</script>
