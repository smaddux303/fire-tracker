<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream & Flood Gauges — Westminster, CO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ash: #2C2C2A; --smoke: #5F5E5A; --mist: #B4B2A9;
    --paper: #F9F6F1; --white: #FFFFFF; --border: rgba(44,44,42,0.12); --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ash); min-height: 100vh; }

  .header { background: #0A1628; color: var(--white); position: relative; overflow: hidden; }
  .header-inner { max-width: 960px; margin: 0 auto; padding: 2rem 2rem 1.5rem; position: relative; z-index: 1; }
  .header-eyebrow { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #5BC4F5; margin-bottom: 0.4rem; font-weight: 500; }
  .header h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.8rem, 7vw, 4.5rem); line-height: 0.95; color: var(--white); }
  .header h1 span { color: #5BC4F5; }
  .header-sub { margin-top: 0.6rem; font-size: 14px; color: rgba(255,255,255,0.5); }
  .header-glow { position: absolute; right: -80px; top: -80px; width: 350px; height: 350px; border-radius: 50%; background: radial-gradient(circle, rgba(91,196,245,0.12) 0%, transparent 70%); pointer-events: none; }

  .status-bar { max-width: 960px; margin: 0 auto; padding: 0 2rem; }
  .status-pill { display: inline-flex; align-items: center; gap: 8px; padding: 0.55rem 1.1rem; border-radius: 0 0 var(--radius) var(--radius); font-size: 13px; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; }
  .status-pill.normal  { background: #EAF3DE; color: #27500A; }
  .status-pill.elevated{ background: #FAEEDA; color: #633806; }
  .status-pill.flood   { background: #FCEBEB; color: #791F1F; }
  .status-pill.loading { background: #E6F1FB; color: #0C447C; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .normal   .status-dot { background: #3B6D11; }
  .elevated .status-dot { background: #BA7517; animation: pulse 2s infinite; }
  .flood    .status-dot { background: #E24B4A; animation: pulse 1s infinite; }
  .loading  .status-dot { background: #378ADD; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(1.4);} }

  .main { max-width: 960px; margin: 0 auto; padding: 2rem; }

  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .metric { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 0.9rem 1rem; }
  .metric-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--smoke); font-weight: 500; margin-bottom: 4px; }
  .metric-value { font-size: 1.6rem; font-family: 'Bebas Neue', sans-serif; line-height: 1; color: var(--ash); }
  .metric-unit { font-size: 11px; color: var(--smoke); margin-top: 2px; }
  .metric.alert .metric-value { color: #E24B4A; }
  .metric.warn  .metric-value { color: #BA7517; }

  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--smoke); font-weight: 600; margin-bottom: 0.8rem; }

  .gauge-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap: 16px; margin-bottom: 1.5rem; }

  .gauge-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
  .gauge-card-accent { height: 5px; }
  .gauge-card-inner { padding: 1.1rem 1.2rem; }
  .gauge-name { font-weight: 700; font-size: 15px; margin-bottom: 3px; }
  .gauge-location { font-size: 11px; color: var(--smoke); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }

  .gauge-readings { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .gauge-reading { background: #F9F6F1; border-radius: 6px; padding: 8px 10px; }
  .gauge-reading-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--smoke); font-weight: 500; margin-bottom: 3px; }
  .gauge-reading-value { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; line-height: 1; }
  .gauge-reading-unit { font-size: 10px; color: var(--smoke); }

  .gauge-status-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .gauge-status-badge { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 4px 10px; border-radius: 5px; }
  .gauge-trend { font-size: 12px; color: var(--smoke); }

  /* Flow bar */
  .flow-bar-wrap { margin: 8px 0; }
  .flow-bar-track { height: 6px; border-radius: 3px; background: linear-gradient(to right, #3B6D11 0%, #D4A017 40%, #E24B4A 75%, #8B0000 100%); position: relative; }
  .flow-bar-marker { position: absolute; top: -4px; width: 14px; height: 14px; border-radius: 50%; background: var(--white); border: 2px solid var(--ash); transform: translateX(-50%); }
  .flow-bar-labels { display: flex; justify-content: space-between; font-size: 9px; color: var(--mist); margin-top: 3px; }

  .gauge-updated { font-size: 11px; color: var(--mist); margin-top: 8px; }
  .gauge-link { font-size: 11px; color: #378ADD; text-decoration: none; margin-top: 4px; display: inline-block; }
  .gauge-link:hover { text-decoration: underline; }

  .status-normal   { background: #EAF3DE; color: #27500A; }
  .status-elevated { background: #FAEEDA; color: #633806; }
  .status-minor    { background: #FFF3CD; color: #7A5C00; }
  .status-moderate { background: #FAECE7; color: #4A1B0C; }
  .status-major    { background: #FCEBEB; color: #791F1F; }
  .status-na       { background: #F1EFE8; color: var(--smoke); }

  .accent-normal   { background: #3B6D11; }
  .accent-elevated { background: #BA7517; }
  .accent-minor    { background: #D85A30; }
  .accent-moderate { background: #E24B4A; }
  .accent-major    { background: #8B0000; }
  .accent-na       { background: var(--mist); }

  .info-box { background: #E6F1FB; border: 1px solid rgba(55,138,221,0.25); border-radius: var(--radius); padding: 0.9rem 1.1rem; font-size: 12px; color: #0C447C; margin-bottom: 1.5rem; line-height: 1.6; }

  .loading-state { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; text-align: center; color: var(--smoke); font-size: 14px; margin-bottom: 1.5rem; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: #5BC4F5; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 0.8rem; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer { max-width: 960px; margin: 0 auto; padding: 0 2rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .footer-left { font-size: 12px; color: var(--smoke); }
  .footer-left a { color: #5BC4F5; text-decoration: none; }
  .footer-left a:hover { text-decoration: underline; }
  .refresh-btn { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; background: #0A1628; color: var(--white); border: none; border-radius: var(--radius); padding: 0.5rem 1.1rem; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
  .refresh-btn:hover { background: #5BC4F5; color: #0A1628; }
  .refresh-btn svg { width: 14px; height: 14px; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(13,27,42,0.96);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,0.1);
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    display: none;
    align-items: center;
    justify-content: space-around;
    z-index: 999;
  }
  .bottom-nav.pwa-active { display: flex; }
  .bottom-nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    text-decoration: none;
    color: rgba(255,255,255,0.6);
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 4px 20px;
    border-radius: 8px;
    transition: color 0.15s;
    cursor: pointer;
    background: none;
    border: none;
  }
  .bottom-nav-btn:active { color: #F5C842; transform: scale(0.92); }
  .bottom-nav-btn.home { color: #F5C842; }
  .bottom-nav-icon { font-size: 1.3rem; line-height: 1; }
  /* Push page content above nav bar — only when PWA active */
  body.pwa-mode { padding-bottom: calc(64px + env(safe-area-inset-bottom)) !important; }

</style>
</head>
<body>

<div class="header">
  <div class="header-glow"></div>
  <div class="header-inner">
    <div class="header-eyebrow">🌊 Water Rescue Awareness</div>
    <h1>Stream &amp; <span>Flood</span><br>Gauge Tracker</h1>
    <p class="header-sub">Clear Creek, Big Dry Creek, Standley Lake Outlet &amp; Tributaries — Westminster, CO</p>
  </div>
</div>

<div class="status-bar">
  <div class="status-pill loading" id="status-pill">
    <div class="status-dot"></div>
    <span id="status-text">Loading gauge data…</span>
  </div>
</div>

<main class="main">
  <div id="content-area">
    <div class="loading-state"><div class="spinner"></div>Fetching real-time gauge data from USGS…</div>
  </div>
</main>

<footer class="footer">
  <div class="footer-left">
    Data from <a href="https://waterdata.usgs.gov" target="_blank">USGS Water Data</a> &bull;
    <a href="https://water.noaa.gov" target="_blank">NOAA Water Prediction</a> &bull;
    Updates every 15 minutes &bull;
    <span id="last-updated">—</span>
  </div>
  <button class="refresh-btn" onclick="loadData()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <polyline points="23 4 23 10 17 10"></polyline>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
    </svg>
    Refresh
  </button>
</footer>

<script>
// USGS NWIS Instantaneous Values API — no key required
const USGS_API = 'https://waterservices.usgs.gov/nwis/iv/';

// Gauges relevant to Westminster FD response area
const GAUGES = [
  {
    id: '06719505',
    name: 'Clear Creek at Golden',
    location: 'Golden, CO — upstream indicator',
    note: 'Primary upstream indicator for Clear Creek flooding into Westminster. Rising levels here typically reach Westminster within 1-2 hours.',
    floodStage: 9.0,
    actionStage: 6.5,
    maxExpected: 14,
    link: 'https://waterdata.usgs.gov/monitoring-location/06719505/'
  },
  {
    id: '06720820',
    name: 'Big Dry Creek at Westminster',
    location: 'Westminster, CO — below Standley Lake',
    note: 'Flows directly from Standley Lake outlet. Monitors lake outflow and downstream flood risk on Big Dry Creek through Westminster.',
    floodStage: 6.0,
    actionStage: 4.0,
    maxExpected: 10,
    link: 'https://waterdata.usgs.gov/monitoring-location/06720820/'
  },
];

function getFloodStatus(stage, gauge) {
  if (stage === null || stage === undefined) return { label:'No Data', class:'na', accentClass:'accent-na', pill:'loading' };
  if (stage >= gauge.floodStage)   return { label:'Flood Stage',    class:'major',    accentClass:'accent-major',    pill:'flood' };
  if (stage >= gauge.floodStage * 0.85) return { label:'Near Flood', class:'moderate', accentClass:'accent-moderate', pill:'flood' };
  if (stage >= gauge.actionStage)  return { label:'Elevated',       class:'elevated',  accentClass:'accent-elevated', pill:'elevated' };
  return { label:'Normal',         class:'normal',   accentClass:'accent-normal',   pill:'normal' };
}

function setStatus(cls, text) {
  const pill = document.getElementById('status-pill');
  pill.className = 'status-pill ' + cls;
  document.getElementById('status-text').textContent = text;
}

function formatCFS(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return Math.round(n).toString();
}

function formatStage(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return parseFloat(n).toFixed(2);
}

function formatTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', timeZoneName:'short' });
}

async function fetchGaugeData(siteNo) {
  const url = `${USGS_API}?sites=${siteNo}&parameterCd=00060,00065&format=json`;
  const res  = await fetch(url);
  const data = await res.json();

  const ts = data.value?.timeSeries || [];
  let stage = null, discharge = null, dateTime = null;

  ts.forEach(series => {
    const code   = series.variable?.variableCode?.[0]?.value;
    const values = series.values?.[0]?.value || [];
    const latest = values[values.length - 1];
    if (!latest) return;
    const val = parseFloat(latest.value);
    if (isNaN(val)) return;
    if (code === '00065') { stage = val; dateTime = latest.dateTime; }
    if (code === '00060') { discharge = val; }
  });

  return { stage, discharge, dateTime };
}

async function loadData() {
  document.getElementById('content-area').innerHTML = `<div class="loading-state"><div class="spinner"></div>Fetching real-time gauge data from USGS…</div>`;
  setStatus('loading', 'Loading gauge data…');

  try {
    const results = await Promise.allSettled(GAUGES.map(g => fetchGaugeData(g.id)));

    const gaugeData = GAUGES.map((g, i) => {
      const r = results[i];
      if (r.status === 'fulfilled') {
        return { ...g, ...r.value };
      }
      return { ...g, stage: null, discharge: null, dateTime: null };
    });

    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', timeZoneName:'short' });

    // Overall status — worst gauge wins
    const statuses = gaugeData.map(g => getFloodStatus(g.stage, g));
    const pillPriority = { flood:0, elevated:1, normal:2, loading:3 };
    const worst = statuses.reduce((a, b) => pillPriority[a.pill] <= pillPriority[b.pill] ? a : b);
    const floodCount    = statuses.filter(s => s.pill === 'flood').length;
    const elevatedCount = statuses.filter(s => s.pill === 'elevated').length;

    if (floodCount > 0)         setStatus('flood',    `${floodCount} gauge${floodCount>1?'s':''} at flood stage — immediate awareness`);
    else if (elevatedCount > 0) setStatus('elevated', `${elevatedCount} gauge${elevatedCount>1?'s':''} above action stage — monitor closely`);
    else                        setStatus('normal',   'All gauges within normal range');

    document.getElementById('content-area').innerHTML = `
      <div class="metrics">
        <div class="metric ${floodCount > 0 ? 'alert' : ''}">
          <div class="metric-label">At Flood Stage</div>
          <div class="metric-value">${floodCount}</div>
          <div class="metric-unit">Gauges</div>
        </div>
        <div class="metric ${elevatedCount > 0 ? 'warn' : ''}">
          <div class="metric-label">Elevated</div>
          <div class="metric-value">${elevatedCount}</div>
          <div class="metric-unit">Gauges</div>
        </div>
        <div class="metric">
          <div class="metric-label">Normal</div>
          <div class="metric-value">${statuses.filter(s=>s.pill==='normal').length}</div>
          <div class="metric-unit">Gauges</div>
        </div>
        <div class="metric">
          <div class="metric-label">Monitored</div>
          <div class="metric-value">${GAUGES.length}</div>
          <div class="metric-unit">Total sites</div>
        </div>
      </div>

      <div class="section-label">Live Gauge Readings</div>
      <div class="gauge-grid">
        ${gaugeData.map((g, i) => {
          const status = statuses[i];
          const pct    = g.stage !== null ? Math.min(95, Math.max(3, (g.stage / g.maxExpected) * 100)) : 50;
          return `
            <div class="gauge-card">
              <div class="gauge-card-accent ${status.accentClass}"></div>
              <div class="gauge-card-inner">
                <div class="gauge-name">${g.name}</div>
                <div class="gauge-location">USGS ${g.id} &bull; ${g.location}</div>
                <div class="gauge-readings">
                  <div class="gauge-reading">
                    <div class="gauge-reading-label">Stage Height</div>
                    <div class="gauge-reading-value" style="color:${status.class==='normal'?'#3B6D11':status.class==='elevated'?'#BA7517':'#E24B4A'}">${formatStage(g.stage)}</div>
                    <div class="gauge-reading-unit">feet</div>
                  </div>
                  <div class="gauge-reading">
                    <div class="gauge-reading-label">Discharge</div>
                    <div class="gauge-reading-value">${formatCFS(g.discharge)}</div>
                    <div class="gauge-reading-unit">cfs</div>
                  </div>
                </div>
                <div class="flow-bar-wrap">
                  <div class="flow-bar-track">
                    <div class="flow-bar-marker" style="left:${pct}%"></div>
                  </div>
                  <div class="flow-bar-labels">
                    <span>Low</span>
                    <span>Action ${g.actionStage}ft</span>
                    <span>Flood ${g.floodStage}ft</span>
                  </div>
                </div>
                <div class="gauge-status-row">
                  <div class="gauge-status-badge status-${status.class}">${status.label}</div>
                  <div class="gauge-trend" style="font-size:10px;color:var(--smoke)">
                    Flood stage: ${g.floodStage} ft &bull; Action: ${g.actionStage} ft
                  </div>
                </div>
                ${g.note ? `<div style="font-size:11px;color:var(--mist);margin-top:8px;line-height:1.4">${g.note}</div>` : ''}
                <div class="gauge-updated">As of ${formatTime(g.dateTime)}</div>
                <a class="gauge-link" href="${g.link}" target="_blank">↗ View full data on USGS</a>
              </div>
            </div>`;
        }).join('')}
      </div>

      <div class="info-box">
        ℹ️ <strong>Standley Lake:</strong> No active USGS flow gauge exists on the lake itself. The <strong>Big Dry Creek gauge</strong> is located 5.2 miles downstream from the Standley Lake outlet and serves as the best real-time indicator of lake outflow and downstream flood potential on Big Dry Creek.<br><br>
        <strong>For water rescue responses:</strong> Call <strong>USGS Colorado Water Science Center</strong> at (303) 236-4882 for real-time consultation. Full map at <a href="https://waterdata.usgs.gov/co/nwis/rt" target="_blank" style="color:#0C447C;font-weight:600">waterdata.usgs.gov</a>.
      </div>`;

  } catch(err) {
    setStatus('loading', 'Unable to load gauge data');
    document.getElementById('content-area').innerHTML = `
      <div class="loading-state">
        <strong>Could not reach USGS Water Data API.</strong><br>
        Check your connection or visit <a href="https://waterdata.usgs.gov/co/nwis/rt" target="_blank" style="color:#5BC4F5">waterdata.usgs.gov</a> directly.<br><br>
        <small style="color:#aaa">${err.message}</small>
      </div>`;
  }
}

loadData();
setInterval(loadData, 15 * 60 * 1000);
</script>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <a class="bottom-nav-btn home" href="index.html">
    <div class="bottom-nav-icon">🏠</div>
    <span>Home</span>
  </a>
  <button class="bottom-nav-btn" onclick="window.location.reload()">
    <div class="bottom-nav-icon">🔄</div>
    <span>Refresh</span>
  </button>
  <a class="bottom-nav-btn" href="javascript:history.back()">
    <div class="bottom-nav-icon">◀</div>
    <span>Back</span>
  </button>
</div>


<script>
// Show bottom nav only when running as installed PWA
(function() {
  var isStandalone = window.navigator.standalone === true ||
                     window.matchMedia('(display-mode: standalone)').matches;
  if (isStandalone) {
    document.body.classList.add('pwa-mode');
    var nav = document.querySelector('.bottom-nav');
    if (nav) nav.classList.add('pwa-active');
  }
})();
</script>
</body>
</html>
