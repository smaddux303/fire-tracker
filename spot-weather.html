<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Spot Weather — Westminster FD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ash:#2C2C2A;--smoke:#5F5E5A;--mist:#B4B2A9;
  --paper:#F9F6F1;--white:#FFFFFF;--border:rgba(44,44,42,0.12);--radius:10px;
  --fire:#D85A30;--fire-deep:#4A1B0C;--fire-pale:#FAECE7;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ash);min-height:100vh;}
.header{background:#0A1628;color:#fff;position:relative;overflow:hidden;}
.header-inner{max-width:960px;margin:0 auto;padding:2rem 2rem 1.5rem;position:relative;z-index:1;}
.header-eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#7EC8E3;margin-bottom:.4rem;font-weight:500;}
.header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.8rem,7vw,4.5rem);line-height:.95;color:#fff;}
.header h1 span{color:#7EC8E3;}
.header-sub{margin-top:.6rem;font-size:14px;color:rgba(255,255,255,.5);}
.header-glow{position:absolute;right:-60px;top:-60px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(126,200,227,.1) 0%,transparent 70%);pointer-events:none;}
.status-bar{max-width:960px;margin:0 auto;padding:0 2rem;}
.status-pill{display:inline-flex;align-items:center;gap:8px;padding:.55rem 1.1rem;border-radius:0 0 var(--radius) var(--radius);font-size:13px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;}
.status-pill.loading {background:#FAEEDA;color:#633806;}
.status-pill.low     {background:#E8F5E9;color:#1B5E20;}
.status-pill.moderate{background:#FFFDE7;color:#5D4037;}
.status-pill.high    {background:#FFF3E0;color:#7E2C00;}
.status-pill.extreme {background:var(--fire-pale);color:var(--fire-deep);}
.status-pill.redflag {background:#7f0000;color:#fff;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:currentColor;}
.status-pill.loading .status-dot,.status-pill.redflag .status-dot{animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.4);}}
.main{max-width:960px;margin:0 auto;padding:2rem;}
.redflag-banner{background:#7f0000;border-radius:var(--radius);padding:1rem 1.2rem;color:#fff;margin-bottom:1.5rem;display:none;}
.redflag-banner.visible{display:block;}
.redflag-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.04em;margin-bottom:4px;}
.redflag-body{font-size:13px;line-height:1.6;opacity:.9;}
.redflag-conditions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.redflag-tag{background:rgba(255,255,255,.15);border-radius:4px;padding:3px 10px;font-size:12px;font-weight:600;}
.fwi-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:1.5rem;}
.fwi-top{padding:1.4rem 1.4rem 0;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.fwi-eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--smoke);font-weight:600;margin-bottom:4px;}
.fwi-score{font-family:'Bebas Neue',sans-serif;font-size:5.5rem;line-height:1;}
.fwi-label{font-size:14px;font-weight:600;margin-top:2px;}
.fwi-right{text-align:right;}
.fwi-gauge{padding:1rem 1.4rem 1.4rem;}
.fwi-track{height:10px;border-radius:5px;background:linear-gradient(to right,#2E7D32 0%,#2E7D32 20%,#F9A825 20%,#F9A825 40%,#EF6C00 40%,#EF6C00 60%,#D85A30 60%,#D85A30 80%,#7f0000 80%,#7f0000 100%);position:relative;margin-bottom:6px;}
.fwi-marker{position:absolute;top:50%;transform:translate(-50%,-50%);width:16px;height:16px;background:var(--white);border:3px solid var(--ash);border-radius:50%;transition:left .6s ease;}
.fwi-track-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--smoke);}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:1.5rem;}
.metric{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:.9rem 1rem;}
.metric-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--smoke);font-weight:500;margin-bottom:4px;}
.metric-value{font-size:1.6rem;font-family:'Bebas Neue',sans-serif;line-height:1;color:var(--ash);}
.metric-unit{font-size:11px;color:var(--smoke);margin-top:2px;}
.metric.alert .metric-value{color:var(--fire);}
.metric.warn  .metric-value{color:#BA7517;}
.conditions-row{display:grid;grid-template-columns:1fr auto;gap:12px;margin-bottom:1.5rem;align-items:start;}
.compass-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:1rem;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:110px;}
.compass-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--smoke);font-weight:500;}
.compass-dir{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--ash);}
.compass-speed{font-size:12px;color:var(--smoke);}
.section-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--smoke);font-weight:600;margin-bottom:.8rem;}
.forecast-scroll{overflow-x:auto;margin-bottom:1.5rem;padding-bottom:4px;}
.forecast-row{display:flex;gap:10px;min-width:max-content;}
.forecast-day{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:.9rem 1rem;min-width:120px;flex-shrink:0;}
.forecast-day.redflag-day{border-color:rgba(127,0,0,.4);background:#fff8f8;}
.forecast-dow{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--smoke);font-weight:600;}
.forecast-date{font-size:10px;color:var(--mist);margin-bottom:8px;}
.forecast-icon{font-size:1.6rem;margin-bottom:6px;}
.forecast-temps{display:flex;gap:6px;align-items:baseline;margin-bottom:6px;}
.forecast-hi{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--ash);}
.forecast-lo{font-size:12px;color:var(--smoke);}
.forecast-detail{font-size:11px;color:var(--smoke);line-height:1.5;}
.forecast-detail span{display:block;}
.forecast-fwi{display:inline-block;margin-top:6px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;}
.ops-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:1.5rem;}
.ops-header{padding:.8rem 1.1rem;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.06em;background:#0A1628;color:#fff;}
.ops-body{padding:1rem 1.1rem;}
.ops-row{display:flex;gap:10px;margin-bottom:10px;font-size:13px;line-height:1.6;}
.ops-row:last-child{margin-bottom:0;}
.ops-icon{font-size:1.2rem;flex-shrink:0;}
.loading-state{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;text-align:center;color:var(--smoke);font-size:14px;margin-bottom:1.5rem;}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:#7EC8E3;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto .8rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.footer{max-width:960px;margin:0 auto;padding:0 2rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.footer-left{font-size:12px;color:var(--smoke);}
.footer-left a{color:#0D7ABF;text-decoration:none;}
.refresh-btn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;background:#0A1628;color:#fff;border:none;border-radius:var(--radius);padding:.5rem 1.1rem;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s;}
.refresh-btn:hover{background:#7EC8E3;color:#0A1628;}
.refresh-btn svg{width:14px;height:14px;}
.info-note{background:#E3F2FD;border:1px solid rgba(13,122,191,.25);border-radius:var(--radius);padding:.9rem 1.1rem;font-size:12px;color:#0D47A1;line-height:1.5;margin-bottom:1.5rem;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,22,40,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.1);padding:8px 0 calc(8px + env(safe-area-inset-bottom));display:none;align-items:center;justify-content:space-around;z-index:999;}
.bottom-nav.pwa-active{display:flex;}
.bottom-nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:rgba(255,255,255,.6);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;letter-spacing:.04em;padding:4px 20px;border-radius:8px;transition:color .15s;cursor:pointer;background:none;border:none;}
.bottom-nav-btn:active{color:#7EC8E3;transform:scale(.92);}
.bottom-nav-btn.home{color:#7EC8E3;}
.bottom-nav-icon{font-size:1.3rem;line-height:1;}
body.pwa-mode{padding-bottom:calc(64px + env(safe-area-inset-bottom))!important;}
</style>
</head>
<body>
<div class="header">
  <div class="header-glow"></div>
  <div class="header-inner">
    <div class="header-eyebrow">🌤️ Situational Awareness</div>
    <h1>Spot <span>Weather</span></h1>
    <p class="header-sub">Westminster, CO — NWS Fire Weather Forecast</p>
  </div>
</div>
<div class="status-bar">
  <div class="status-pill loading" id="status-pill">
    <div class="status-dot"></div>
    <span id="status-text">Loading weather data…</span>
  </div>
</div>
<main class="main" id="main-content">
  <div class="loading-state"><div class="spinner"></div>Fetching NWS forecast for Westminster…</div>
</main>
<footer class="footer">
  <div class="footer-left">
    Data from <a href="https://www.weather.gov" target="_blank">NWS / weather.gov</a> &bull;
    <a href="https://forecast.weather.gov/MapClick.php?CityName=Westminster&state=CO&site=BOU&textField1=39.8367&textField2=-105.0372" target="_blank">Full NWS Forecast</a> &bull;
    <span id="last-updated">—</span>
  </div>
  <button class="refresh-btn" onclick="loadData()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <polyline points="23 4 23 10 17 10"></polyline>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
    </svg>
    Refresh
  </button>
</footer>
<div class="bottom-nav">
  <a class="bottom-nav-btn home" href="index.html"><div class="bottom-nav-icon">🏠</div><span>Home</span></a>
  <button class="bottom-nav-btn" onclick="window.location.reload()"><div class="bottom-nav-icon">🔄</div><span>Refresh</span></button>
  <a class="bottom-nav-btn" href="javascript:history.back()"><div class="bottom-nav-icon">◀</div><span>Back</span></a>
</div>
<script>
var NWS_POINTS_URL = 'https://api.weather.gov/points/39.8367,-105.0372';
var NWS_HDR = {'User-Agent':'WestminsterFDHub/1.0'};
var GRID_PROPS = null, STATION_URL = null;

function calcFWI(t,rh,w) {
  if(t===null||rh===null||w===null) return null;
  return Math.round(Math.min(40,Math.max(0,((t-32)/78)*40))+Math.min(40,Math.max(0,((100-rh)/100)*40))+Math.min(20,Math.max(0,(w/40)*20)));
}
function fwiLevel(s) {
  if(s===null) return {label:'Unknown',cls:'loading',color:'#B4B2A9',bg:'#F9F6F1'};
  if(s<20) return {label:'Low',      cls:'low',      color:'#2E7D32',bg:'#E8F5E9'};
  if(s<40) return {label:'Moderate', cls:'moderate', color:'#F9A825',bg:'#FFFDE7'};
  if(s<60) return {label:'High',     cls:'high',     color:'#EF6C00',bg:'#FFF3E0'};
  if(s<80) return {label:'Very High',cls:'extreme',  color:'#D85A30',bg:'#FAECE7'};
  return          {label:'Extreme',  cls:'redflag',  color:'#7f0000',bg:'#ffebee'};
}
function isRF(t,rh,w){ return rh!==null&&rh<=15&&w!==null&&w>=20&&t!==null&&t>=75; }
function wDir(deg){ if(deg===null)return '—'; var d=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW']; return d[Math.round(deg/22.5)%16]; }
function mpsToMph(v){ return v!==null?Math.round(v*2.237):null; }
function cToF(v){ return v!==null?Math.round(v*9/5+32):null; }
function tColor(f){ if(f>=95)return'#D50000';if(f>=85)return'#D85A30';if(f>=75)return'#F9A825';return'#2C2C2A'; }
function rhColor(v){ if(v<=10)return'#D50000';if(v<=15)return'#D85A30';if(v<=25)return'#F9A825';return'#2C2C2A'; }
function wColor(v){ if(v>=30)return'#D50000';if(v>=20)return'#D85A30';if(v>=15)return'#F9A825';return'#2C2C2A'; }
function wxIcon(sf){ var f=(sf||'').toLowerCase();
  if(f.includes('thunder'))return'⛈';if(f.includes('snow')||f.includes('blizzard'))return'❄️';
  if(f.includes('rain')||f.includes('shower'))return'🌧️';if(f.includes('fog'))return'🌫️';
  if(f.includes('wind'))return'💨';if(f.includes('cloud')||f.includes('overcast'))return'☁️';
  if(f.includes('partly'))return'⛅';if(f.includes('sunny')||f.includes('clear'))return'☀️';return'🌤️'; }

function setStatus(cls,text){ var p=document.getElementById('status-pill'); p.className='status-pill '+cls; document.getElementById('status-text').textContent=text; }

function fetchT(url,ms){
  ms=ms||8000;
  var ctrl=new AbortController();
  var t=setTimeout(function(){ctrl.abort();},ms);
  return fetch(url,{headers:NWS_HDR,signal:ctrl.signal}).finally(function(){clearTimeout(t);});
}

async function ensureGrid(){
  if(GRID_PROPS) return;
  var r=await fetchT(NWS_POINTS_URL,6000); var d=await r.json(); GRID_PROPS=d.properties;
}
async function ensureStation(){
  if(STATION_URL) return;
  await ensureGrid();
  var r=await fetchT(GRID_PROPS.observationStations,6000); var d=await r.json(); STATION_URL=d.features[0].id;
}

function el(tag,cls,html){
  var e=document.createElement(tag);
  if(cls) e.className=cls;
  if(html!==undefined) e.innerHTML=html;
  return e;
}
function ap(parent,child){ parent.appendChild(child); return parent; }

function render(obs, daily){
  var tempF  = cToF(obs.temperature?obs.temperature.value:null);
  var rhPct  = obs.relativeHumidity?Math.round(obs.relativeHumidity.value):null;
  var windMph= mpsToMph(obs.windSpeed?obs.windSpeed.value:null);
  var windDeg= obs.windDirection?obs.windDirection.value:null;
  var dewF   = cToF(obs.dewpoint?obs.dewpoint.value:null);
  var fwi    = calcFWI(tempF,rhPct,windMph);
  var lvl    = fwiLevel(fwi);
  var rf     = isRF(tempF,rhPct,windMph);
  var fwiPct = fwi!==null?Math.min(98,Math.max(2,fwi)):50;

  setStatus(rf?'redflag':lvl.cls, rf?'🚨 Red Flag Conditions':'Fire Weather: '+lvl.label+' — FWI '+(fwi!==null?fwi:'—'));
  document.getElementById('last-updated').textContent='Updated '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'});

  // Build days
  var days=[];
  for(var i=0;i<daily.length-1&&days.length<7;i+=2){
    var day=daily[i], nite=daily[i+1]||{};
    var hiF=day.temperature, loF=nite.temperature!==undefined?nite.temperature:null;
    var wMph=day.windSpeed?mpsToMph(parseInt(day.windSpeed)):null;
    var dl=fwiLevel(calcFWI(hiF,null,wMph));
    days.push({day:day,hiF:hiF,loF:loF,wMph:wMph,dayFwi:calcFWI(hiF,null,wMph),dayRf:wMph!==null&&wMph>=20&&hiF>=75,lvl:dl});
  }

  var frag=document.createDocumentFragment();

  // Red flag banner
  var rfBanner=el('div','redflag-banner'+(rf?' visible':''));
  rfBanner.appendChild(el('div','redflag-title','🚨 Red Flag Conditions — Westminster'));
  rfBanner.appendChild(el('div','redflag-body','Critical fire weather conditions are present. RH, wind, and temperature have all crossed red flag thresholds simultaneously.'));
  if(rf){
    var tags=el('div','redflag-conditions');
    if(rhPct!==null&&rhPct<=15) tags.appendChild(el('span','redflag-tag','RH '+rhPct+'% (≤15%)'));
    if(windMph!==null&&windMph>=20) tags.appendChild(el('span','redflag-tag','Wind '+windMph+' mph (≥20 mph)'));
    if(tempF!==null&&tempF>=75) tags.appendChild(el('span','redflag-tag','Temp '+tempF+'°F (≥75°F)'));
    rfBanner.appendChild(tags);
  }
  frag.appendChild(rfBanner);

  // FWI card
  var fwiCard=el('div','fwi-card');
  var fwiTop=el('div','fwi-top');
  var fwiLeft=el('div');
  fwiLeft.appendChild(el('div','fwi-eyebrow','Fire Weather Index'));
  var fwiScore=el('div','fwi-score',(fwi!==null?fwi:'—')+'');
  fwiScore.style.color=lvl.color; fwiLeft.appendChild(fwiScore);
  var fwiLbl=el('div','fwi-label',lvl.label);
  fwiLbl.style.color=lvl.color; fwiLeft.appendChild(fwiLbl);
  var fwiRight=el('div','fwi-right');
  fwiRight.innerHTML='<div style="font-size:13px;font-weight:600;color:var(--ash)">📍 Westminster, CO</div><div style="font-size:11px;color:var(--smoke);margin-top:4px">Elev. ~5,387 ft</div><div style="margin-top:8px;font-size:12px;color:var(--smoke)">Based on current<br>temp, RH & wind</div>';
  ap(ap(fwiTop,fwiLeft),fwiRight); fwiCard.appendChild(fwiTop);
  var gauge=el('div','fwi-gauge');
  var track=el('div','fwi-track');
  var marker=el('div','fwi-marker'); marker.style.left=fwiPct+'%'; track.appendChild(marker);
  gauge.appendChild(track);
  gauge.appendChild(el('div','fwi-track-labels','<span>Low</span><span>Moderate</span><span>High</span><span>Very High</span><span>Extreme</span>'));
  fwiCard.appendChild(gauge); frag.appendChild(fwiCard);

  // Metrics
  var metrics=el('div','metrics');
  function mkMetric(lbl,val,unit,extra,colorVal){
    var m=el('div','metric'+(extra?' '+extra:''));
    m.appendChild(el('div','metric-label',lbl));
    var v=el('div','metric-value',val);
    if(colorVal) v.style.color=colorVal;
    m.appendChild(v); m.appendChild(el('div','metric-unit',unit)); return m;
  }
  metrics.appendChild(mkMetric('Temperature',(tempF!==null?tempF:'—')+'°','Fahrenheit',tempF>=85?'alert':tempF>=75?'warn':'',tColor(tempF)));
  metrics.appendChild(mkMetric('Rel. Humidity',(rhPct!==null?rhPct:'—')+'%',rhPct!==null&&rhPct<=15?'⚠ Critical':rhPct!==null&&rhPct<=25?'Low':'Current',rhPct!==null&&rhPct<=10?'alert':rhPct!==null&&rhPct<=15?'warn':'',rhColor(rhPct)));
  metrics.appendChild(mkMetric('Wind Speed',(windMph!==null?windMph:'—'),'mph · '+wDir(windDeg),windMph!==null&&windMph>=20?'alert':windMph!==null&&windMph>=15?'warn':'',wColor(windMph)));
  metrics.appendChild(mkMetric('Dew Point',(dewF!==null?dewF:'—')+'°','Fahrenheit','',''));
  frag.appendChild(metrics);

  // Conditions + compass
  var condRow=el('div','conditions-row');
  var condLeft=el('div');
  condLeft.style.cssText='display:flex;flex-direction:column;gap:10px;flex:1';
  var condCard=el('div');
  condCard.style.cssText='background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:1rem';
  condCard.appendChild(el('div','section-label','Current Conditions'));
  var condDetail=el('div');
  condDetail.style.cssText='font-size:13px;color:var(--smoke);line-height:1.8';
  condDetail.innerHTML='<div><strong style="color:var(--ash)">Sky:</strong> '+(obs.textDescription||'—')+'</div>'+
    '<div><strong style="color:var(--ash)">Wind:</strong> '+(windMph!==null?windMph:'—')+' mph from '+wDir(windDeg)+(windDeg!==null?' ('+Math.round(windDeg)+'°)':'')+'</div>'+
    '<div><strong style="color:var(--ash)">Humidity:</strong> '+(rhPct!==null?rhPct:'—')+'%</div>'+
    '<div><strong style="color:var(--ash)">Dew Point:</strong> '+(dewF!==null?dewF:'—')+'°F</div>';
  condCard.appendChild(condDetail); condLeft.appendChild(condCard); condRow.appendChild(condLeft);

  // Compass
  var compass=el('div','compass-card');
  compass.appendChild(el('div','compass-label','Wind'));
  var ring=el('div'); ring.style.cssText='width:80px;height:80px;';
  if(windDeg!==null){
    var fromDeg=(windDeg+180)%360;
    var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 80 80'); svg.style.cssText='width:80px;height:80px;';
    var c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx','40');c.setAttribute('cy','40');c.setAttribute('r','36');
    c.setAttribute('fill','none');c.setAttribute('stroke','rgba(44,44,42,0.1)');c.setAttribute('stroke-width','2');
    svg.appendChild(c);
    [['N',40,12],['S',40,73],['W',10,44],['E',70,44]].forEach(function(p){
      var t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x',p[1]);t.setAttribute('y',p[2]);t.setAttribute('text-anchor','middle');
      t.setAttribute('font-size','9');t.setAttribute('fill','#B4B2A9');
      t.setAttribute('font-family','DM Sans,sans-serif');t.setAttribute('font-weight','600');
      t.textContent=p[0]; svg.appendChild(t);
    });
    var g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('transform','rotate('+fromDeg+',40,40)');
    var p1=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    p1.setAttribute('points','40,16 35,52 40,46 45,52');p1.setAttribute('fill','#D85A30');
    var p2=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    p2.setAttribute('points','40,64 35,52 40,58 45,52');p2.setAttribute('fill','rgba(44,44,42,0.25)');
    g.appendChild(p1);g.appendChild(p2);svg.appendChild(g);
    ring.appendChild(svg);
  }
  compass.appendChild(ring);
  compass.appendChild(el('div','compass-dir',wDir(windDeg)));
  compass.appendChild(el('div','compass-speed',(windMph!==null?windMph:'—')+' mph'));
  condRow.appendChild(compass); frag.appendChild(condRow);

  // 7-day forecast
  frag.appendChild(el('div','section-label','7-Day Fire Weather Outlook'));
  var scroll=el('div','forecast-scroll');
  var row=el('div','forecast-row');
  days.forEach(function(d){
    var dow=new Date(d.day.startTime).toLocaleDateString('en-US',{weekday:'short'});
    var dt=new Date(d.day.startTime).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    var card=el('div',d.dayRf?'forecast-day redflag-day':'forecast-day');
    card.appendChild(el('div','forecast-dow',dow+(d.dayRf?' 🚨':'')));
    card.appendChild(el('div','forecast-date',dt));
    card.appendChild(el('div','forecast-icon',wxIcon(d.day.shortForecast)));
    var temps=el('div','forecast-temps');
    temps.appendChild(el('span','forecast-hi',(d.hiF!==null?d.hiF:'—')+'°'));
    temps.appendChild(el('span','forecast-lo','/'+(d.loF!==null?d.loF:'—')+'°'));
    card.appendChild(temps);
    var detail=el('div','forecast-detail');
    detail.appendChild(el('span',null,'💨 '+(d.wMph!==null?d.wMph:'—')+' mph '+(d.day.windDirection||'')));
    detail.appendChild(el('span',null,d.day.shortForecast));
    card.appendChild(detail);
    if(d.dayFwi!==null){
      var fwiSpan=el('span','forecast-fwi','FWI '+d.dayFwi+' · '+d.lvl.label);
      fwiSpan.style.background=d.lvl.bg; fwiSpan.style.color=d.lvl.color;
      card.appendChild(fwiSpan);
    }
    row.appendChild(card);
  });
  scroll.appendChild(row); frag.appendChild(scroll);

  // Ops guidance
  var opsRows=[];
  if(rf) opsRows.push({icon:'🚨',text:'<strong>Red Flag Conditions:</strong> Elevated fire behavior expected. Brief all crews on fire weather. Consider increased staffing or pre-positioning for interface areas.'});
  if(windMph!==null&&windMph>=20) opsRows.push({icon:'💨',text:'<strong>High Winds ('+windMph+' mph):</strong> Rapid fire spread potential. Account for wind direction when establishing defensive positions.'});
  if(rhPct!==null&&rhPct<=15) opsRows.push({icon:'💧',text:'<strong>Critical Low Humidity ('+rhPct+'%):</strong> Fine fuels extremely receptive to ignition. Increased ember cast range. Extended mop-up times required.'});
  if(fwi!==null&&fwi>=60&&!rf) opsRows.push({icon:'⚠️',text:'<strong>Very High FWI:</strong> Conditions approaching red flag criteria. Monitor closely for deterioration.'});
  if(fwi!==null&&fwi<40) opsRows.push({icon:'✅',text:'<strong>Favorable Conditions:</strong> Fire weather indices within normal range. Standard protocols apply.'});
  opsRows.push({icon:'🌬️',text:'Front Range tip: Watch for afternoon upslope/downslope wind shifts, especially in spring and fall. Conditions can deteriorate rapidly as marine push subsides.'});

  frag.appendChild(el('div','section-label','Operational Guidance'));
  var opsCard=el('div','ops-card');
  opsCard.appendChild(el('div','ops-header','🚒 Westminster FD — Fire Weather Notes'));
  var opsBody=el('div','ops-body');
  opsRows.forEach(function(r){ var row=el('div','ops-row'); row.appendChild(el('div','ops-icon',r.icon)); var txt=el('div'); txt.innerHTML=r.text; row.appendChild(txt); opsBody.appendChild(row); });
  opsCard.appendChild(opsBody); frag.appendChild(opsCard);

  frag.appendChild(el('div','info-note','ℹ️ Fire Weather Index is calculated from current NWS observations (temperature, relative humidity, wind speed). Red flag conditions follow NWS Boulder thresholds: RH ≤ 15%, sustained winds ≥ 20 mph, temp ≥ 75°F. For official red flag warnings visit <a href="https://www.weather.gov/bou/" target="_blank">weather.gov/bou</a>.'));

  var main=document.getElementById('main-content');
  main.innerHTML=''; main.appendChild(frag);
}

function showError(msg){
  setStatus('loading','Unable to load weather data');
  document.getElementById('main-content').innerHTML='<div class="loading-state"><strong>Could not load NWS data.</strong><br><br>'+msg+'<br><br>Visit <a href="https://forecast.weather.gov/MapClick.php?CityName=Westminster&state=CO" target="_blank" style="color:#0D7ABF">weather.gov</a> directly.</div>';
}

async function loadData(){
  document.getElementById('main-content').innerHTML='<div class="loading-state"><div class="spinner"></div>Fetching NWS forecast for Westminster…</div>';
  setStatus('loading','Loading weather data…');
  try {
    await Promise.all([ensureGrid(), ensureStation()]);
    var results=await Promise.all([
      fetchT(STATION_URL+'/observations/latest',8000),
      fetchT(GRID_PROPS.forecast,8000)
    ]);
    var obsData=await results[0].json();
    var fcData =await results[1].json();
    render(obsData.properties, fcData.properties.periods);
  } catch(err){
    var msg=err.name==='AbortError'?'NWS request timed out. Try refreshing.':err.message;
    showError(msg);
  }
}

loadData();
setInterval(loadData,30*60*1000);

(function(){
  var s=window.navigator.standalone===true||window.matchMedia('(display-mode: standalone)').matches;
  if(s){document.body.classList.add('pwa-mode');var n=document.querySelector('.bottom-nav');if(n)n.classList.add('pwa-active');}
})();
</script>
