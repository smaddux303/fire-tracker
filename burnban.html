<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burn Ban Status — Westminster, CO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ash: #2C2C2A;
    --smoke: #5F5E5A;
    --mist: #B4B2A9;
    --paper: #F9F6F1;
    --white: #FFFFFF;
    --border: rgba(44,44,42,0.12);
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ash); min-height: 100vh; }

  .header { background: #1c1a0f; color: var(--white); position: relative; overflow: hidden; }
  .header-inner { max-width: 900px; margin: 0 auto; padding: 2rem 2rem 1.5rem; position: relative; z-index: 1; }
  .header-eyebrow { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #FAC775; margin-bottom: 0.4rem; font-weight: 500; }
  .header h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.8rem, 7vw, 4.5rem); line-height: 0.95; color: var(--white); }
  .header h1 span { color: #FAC775; }
  .header-sub { margin-top: 0.6rem; font-size: 14px; color: rgba(255,255,255,0.5); }
  .header-glow { position: absolute; right: -80px; top: -80px; width: 350px; height: 350px; border-radius: 50%; background: radial-gradient(circle, rgba(250,199,117,0.12) 0%, transparent 70%); pointer-events: none; }

  .status-bar { max-width: 900px; margin: 0 auto; padding: 0 2rem; }
  .status-pill { display: inline-flex; align-items: center; gap: 8px; padding: 0.55rem 1.1rem; border-radius: 0 0 var(--radius) var(--radius); font-size: 13px; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; }
  .status-pill.clear   { background: #EAF3DE; color: #27500A; }
  .status-pill.warning { background: #FAEEDA; color: #633806; }
  .status-pill.danger  { background: #FCEBEB; color: #791F1F; }
  .status-pill.loading { background: #FAEEDA; color: #633806; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .clear   .status-dot { background: #3B6D11; }
  .warning .status-dot { background: #BA7517; animation: pulse 2s infinite; }
  .danger  .status-dot { background: #E24B4A; animation: pulse 1.5s infinite; }
  .loading .status-dot { background: #BA7517; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(1.4);} }

  .main { max-width: 900px; margin: 0 auto; padding: 2rem; }

  .county-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin-bottom: 2rem; }

  .county-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
  .county-card-accent { height: 6px; }
  .county-card-inner { padding: 1.2rem 1.3rem; }
  .county-name { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--smoke); font-weight: 600; margin-bottom: 6px; }
  .county-status { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; line-height: 1; margin-bottom: 6px; }
  .county-notes { font-size: 13px; color: var(--smoke); line-height: 1.5; margin-bottom: 10px; }
  .county-meta { font-size: 11px; color: var(--mist); }
  .county-links { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; }
  .county-link { font-size: 12px; color: #378ADD; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
  .county-link:hover { text-decoration: underline; }

  .status-none    { color: #3B6D11; } .accent-none    { background: #3B6D11; }
  .status-stage1  { color: #BA7517; } .accent-stage1  { background: #BA7517; }
  .status-stage2  { color: #D85A30; } .accent-stage2  { background: #D85A30; }
  .status-total   { color: #A32D2D; } .accent-total   { background: #A32D2D; }

  .how-to-update { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.3rem; margin-bottom: 2rem; }
  .how-to-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .how-to-steps { font-size: 13px; color: var(--smoke); line-height: 1.8; }
  .how-to-steps ol { padding-left: 1.2rem; }
  .how-to-steps code { background: #F1EFE8; padding: 1px 5px; border-radius: 4px; font-size: 12px; font-family: monospace; color: var(--ash); }

  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 1.5rem; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--smoke); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  .loading-state { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; text-align: center; color: var(--smoke); font-size: 14px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: #BA7517; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 0.8rem; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer { max-width: 900px; margin: 0 auto; padding: 0 2rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .footer-left { font-size: 12px; color: var(--smoke); }
  .footer-left a { color: #BA7517; text-decoration: none; }
  .footer-left a:hover { text-decoration: underline; }
  .refresh-btn { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; background: #1c1a0f; color: var(--white); border: none; border-radius: var(--radius); padding: 0.5rem 1.1rem; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
  .refresh-btn:hover { background: #BA7517; }
  .refresh-btn svg { width: 14px; height: 14px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-glow"></div>
  <div class="header-inner">
    <div class="header-eyebrow">🔥 Burn Restriction Status</div>
    <h1>Burn <span>Ban</span><br>Tracker</h1>
    <p class="header-sub">Jefferson County, Adams County &amp; City of Westminster</p>
  </div>
</div>

<div class="status-bar">
  <div class="status-pill loading" id="status-pill">
    <div class="status-dot"></div>
    <span id="status-text">Loading status…</span>
  </div>
</div>

<main class="main">
  <div id="content-area">
    <div class="loading-state"><div class="spinner"></div>Loading current burn ban status…</div>
  </div>
</main>

<footer class="footer">
  <div class="footer-left">
    Status maintained by fire department staff &bull; <span id="last-fetch">—</span><br>
    Official sources:
    <a href="https://www.jeffco.us/1460/Fire-Restrictions" target="_blank">Jefferson County</a> &bull;
    <a href="https://www.adcogov.org/burn-restrictions" target="_blank">Adams County</a> &bull;
    <a href="https://www.cityofwestminster.us/Government/Departments/Fire/OpenBurning" target="_blank">Westminster</a>
  </div>
  <button class="refresh-btn" onclick="loadStatus()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <polyline points="23 4 23 10 17 10"></polyline>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
    </svg>
    Refresh
  </button>
</footer>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/smaddux303/fire-tracker/main/burnban-status.json';

const COUNTIES = [
  { key: 'jefferson', name: 'Jefferson County',      link: 'https://www.jeffco.us/1460/Fire-Restrictions',                          linkLabel: 'Official Jefferson County page' },
  { key: 'adams',     name: 'Adams County',          link: 'https://www.adcogov.org/burn-restrictions',                             linkLabel: 'Official Adams County page' },
  { key: 'westminster',name:'City of Westminster',   link: 'https://www.cityofwestminster.us/Government/Departments/Fire/OpenBurning', linkLabel: 'Official Westminster page' }
];

const LEVEL_MAP = {
  none:   { accentClass: 'accent-none',   statusClass: 'status-none',   pillType: 'clear',   pillText: 'No active burn restrictions' },
  stage1: { accentClass: 'accent-stage1', statusClass: 'status-stage1', pillType: 'warning', pillText: 'Fire restrictions in effect' },
  stage2: { accentClass: 'accent-stage2', statusClass: 'status-stage2', pillType: 'warning', pillText: 'Stage 2 restrictions in effect' },
  total:  { accentClass: 'accent-total',  statusClass: 'status-total',  pillType: 'danger',  pillText: 'Total fire ban in effect' },
};

function setStatus(type, text) {
  const pill = document.getElementById('status-pill');
  pill.className = 'status-pill ' + type;
  document.getElementById('status-text').textContent = text;
}

async function loadStatus() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    const data = await res.json();

    document.getElementById('last-fetch').textContent = 'Refreshed ' + new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });

    const levels = COUNTIES.map(c => data[c.key]?.level || 'none');
    const worstLevel = levels.includes('total') ? 'total'
                     : levels.includes('stage2') ? 'stage2'
                     : levels.includes('stage1') ? 'stage1' : 'none';
    const worstMap = LEVEL_MAP[worstLevel];
    setStatus(worstMap.pillType, worstMap.pillText);

    const anyActive = worstLevel !== 'none';
    const activeCount = levels.filter(l => l !== 'none').length;

    document.getElementById('content-area').innerHTML = `
      ${anyActive ? `
      <div style="background:#FAEEDA;border:1px solid rgba(186,117,23,0.3);border-radius:var(--radius);padding:1rem 1.2rem;margin-bottom:1.5rem;font-size:13px;color:#633806;line-height:1.6;">
        <strong>⚠️ ${activeCount} area${activeCount > 1 ? 's have' : ' has'} active fire restrictions.</strong>
        Always check the official county/city website for the most current details before burning.
      </div>` : ''}

      <div class="legend" style="margin-bottom:1.2rem;">
        <div class="legend-item"><div class="legend-dot" style="background:#3B6D11"></div>No restrictions</div>
        <div class="legend-item"><div class="legend-dot" style="background:#BA7517"></div>Stage 1 / Level 1</div>
        <div class="legend-item"><div class="legend-dot" style="background:#D85A30"></div>Stage 2 / Level 2</div>
        <div class="legend-item"><div class="legend-dot" style="background:#A32D2D"></div>Total ban</div>
      </div>

      <div class="county-grid">
        ${COUNTIES.map(c => {
          const d = data[c.key] || {};
          const level = d.level || 'none';
          const map = LEVEL_MAP[level];
          return `
            <div class="county-card">
              <div class="county-card-accent ${map.accentClass}"></div>
              <div class="county-card-inner">
                <div class="county-name">${c.name}</div>
                <div class="county-status ${map.statusClass}">${d.status || 'Unknown'}</div>
                <div class="county-notes">${d.notes || '—'}</div>
                <div class="county-meta">Updated ${d.updated || '—'}${d.updatedBy ? ' by ' + d.updatedBy : ''}</div>
                <div class="county-links">
                  <a class="county-link" href="${c.link}" target="_blank">↗ ${c.linkLabel}</a>
                </div>
              </div>
            </div>`;
        }).join('')}
      </div>

      <div class="how-to-update">
        <div class="how-to-title">✏️ How to update this page</div>
        <div class="how-to-steps">
          <ol>
            <li>Go to <a href="https://github.com/smaddux303/fire-tracker/blob/main/burnban-status.json" target="_blank" style="color:#378ADD;">github.com/smaddux303/fire-tracker</a> and open <code>burnban-status.json</code></li>
            <li>Click the <strong>pencil (edit) icon</strong> in the top right</li>
            <li>Change the <code>"status"</code>, <code>"level"</code>, <code>"notes"</code>, and <code>"updated"</code> fields for the relevant county</li>
            <li>For <code>"level"</code> use: <code>none</code>, <code>stage1</code>, <code>stage2</code>, or <code>total</code></li>
            <li>Click <strong>Commit changes</strong> — the page will update within 1 minute</li>
          </ol>
        </div>
      </div>`;

  } catch (err) {
    setStatus('loading', 'Unable to load status');
    document.getElementById('content-area').innerHTML = `
      <div class="loading-state">
        <strong>Could not load burn ban status.</strong><br>
        Check your connection and try refreshing.<br><br>
        <small style="color:#aaa">${err.message}</small>
      </div>`;
  }
}

loadStatus();
setInterval(loadStatus, 5 * 60 * 1000);
</script>
</body>
</html>
